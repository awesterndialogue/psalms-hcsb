function initCarMode(verses) {
  carState = { verses, idx: 0, wrongWords: 0 };
  document.getElementById('carProgress').textContent = `0 / ${verses.length} verses`;
  // Hide the recite detail actions area since buttons are in car mode layout
  document.getElementById('reciteDetailActions').style.display = 'none';
  // Prevent scroll on the detail body
  document.getElementById('reciteDetailBody').style.overflow = 'hidden';
}

function handleCarTap() {
  if (!carState) return;
  const { verses, idx } = carState;
  if (idx >= verses.length) return;
  const v = verses[idx];
  const display = document.getElementById('carVerseDisplay');
  const words = v.text.split(/\s+/).filter(w=>w);
  let whtml = `<div id="carVerseInner"><span style="font-weight:700;color:var(--accent);vertical-align:super;margin-right:4px;font-family:var(--font-display)">${v.num}</span>`;
  for (const w of words) {
    whtml += `<span class="car-word" style="cursor:pointer;font-family:var(--font-display);line-height:1.6;color:var(--text-primary);padding:2px 3px" onclick="toggleCarWrong(this)">${w} </span>`;
  }
  whtml += '</div>';
  display.innerHTML = whtml;
  fitCarText();
  carState.idx++;
  document.getElementById('carProgress').textContent = `${carState.idx} / ${verses.length} verses`;
  if (carState.idx >= verses.length) {
    const btn = document.getElementById('carTapBtn');
    btn.textContent = 'Finished — How did I do?';
    btn.style.fontSize = '22px';
    btn.onclick = function() { handleCarComplete(); };
  }
}

function fitCarText() {
  const container = document.getElementById('carVerseDisplay');
  const inner = document.getElementById('carVerseInner');
  if (!container || !inner) return;
  let size = 28;
  inner.style.fontSize = size + 'px';
  while (size > 13 && inner.scrollHeight > container.clientHeight) {
    size -= 1;
    inner.style.fontSize = size + 'px';
  }
}

function toggleCarWrong(el) {
  if (!carState) return;
  if (el.classList.contains('car-wrong')) {
    el.classList.remove('car-wrong');
    el.style.color = 'var(--text-primary)';
    el.style.textDecoration = 'none';
    carState.wrongWords--;
  } else {
    el.classList.add('car-wrong');
    el.style.color = 'var(--red)';
    el.style.textDecoration = 'underline';
    carState.wrongWords++;
  }
}

function handleCarComplete() {
  // Restore scroll and actions area
  document.getElementById('reciteDetailBody').style.overflow = '';
  const acts = document.getElementById('reciteDetailActions');
  acts.style.display = '';
  const body = document.getElementById('reciteDetailBody');
  const wrong = carState ? carState.wrongWords : 0;
  body.innerHTML = `<div style="text-align:center;padding:40px 0"><div style="font-size:48px;margin-bottom:12px">✓</div><div style="font-family:var(--font-display);font-size:22px;color:var(--accent)">Recitation Complete</div>${wrong > 0 ? `<div style="font-size:15px;color:var(--red);margin-top:8px">${wrong} word${wrong>1?'s':''} marked wrong</div>` : ''}</div>`;
  if (wrong > 0) {
    acts.innerHTML = `<button class="action-btn btn-pass" onclick="handlePass()">✓ I Recited It (minor mistakes)</button><button class="action-btn btn-fail" onclick="handlePracticed()">✗ Try Again Tomorrow</button>`;
  } else {
    acts.innerHTML = `<button class="action-btn btn-pass" onclick="handlePass()">✓ I Recited It Correctly</button>`;
  }
}

// ═══════════════════════════════════════════
// VERSE TAP MODE
// ═══════════════════════════════════════════
let vtState = null;

function renderVerseTapMode(verses) {
  let h = '<div class="first-letter-area">';
  h += '<div id="vtVerses">';
  for (let i=0;i<verses.length;i++) {
    h += `<div class="verse-card hidden-card vt-verse" data-vidx="${i}" style="margin-bottom:8px;padding:20px;cursor:default">Verse ${verses[i].num}</div>`;
  }
  h += '</div>';
  h += '<div style="position:sticky;bottom:0;padding:12px 0;background:var(--bg-deep);text-align:center">';
  h += '<button class="step-btn" id="vtTapBtn" style="margin:0 auto" onclick="handleVerseTap()">Tap to Reveal Next Verse</button>';
  h += '<div class="fl-progress" id="vtProgress" style="margin-top:8px"></div>';
  h += '<div id="vtWrongCount" style="font-size:12px;color:var(--red);margin-top:4px;min-height:18px"></div>';
  h += '<button class="action-btn btn-fail" style="margin-top:8px" onclick="handleTapNeedPractice()">✗ I Need to Practice</button>';
  h += '</div></div>';
  return h;
}

function initVerseTapMode(verses) {
  vtState = { verses, idx: 0, wrongWords: 0 };
  document.getElementById('vtProgress').textContent = `0 / ${verses.length} verses`;
}

function handleVerseTap() {
  if (!vtState || vtState.idx >= vtState.verses.length) return;
  const v = vtState.verses[vtState.idx];
  const card = document.querySelectorAll('.vt-verse')[vtState.idx];
  if (!card) return;
  const words = v.text.split(/\s+/).filter(w=>w);
  let whtml = `<span class="verse-num" style="font-size:15px;vertical-align:super;color:var(--accent);font-weight:700;margin-right:2px">${v.num}</span>`;
  for (let wi=0;wi<words.length;wi++) {
    whtml += `<span class="vt-word" style="cursor:pointer;font-family:var(--font-display);font-size:var(--font-verse-size);line-height:1.8;color:var(--text-primary);padding:1px 2px" onclick="toggleWrongWord(this)">${words[wi]} </span>`;
  }
  card.classList.remove('hidden-card');
  card.style.borderStyle = 'solid';
  card.style.borderColor = 'var(--border-subtle)';
  card.style.textAlign = 'left';
  card.style.fontStyle = 'normal';
  card.innerHTML = whtml;
  vtState.idx++;
  document.getElementById('vtProgress').textContent = `${vtState.idx} / ${vtState.verses.length} verses`;
  if (vtState.idx >= vtState.verses.length) {
    const btn = document.getElementById('vtTapBtn');
    btn.textContent = 'Finished — How did I do?';
    btn.onclick = function() { handleVTComplete(); };
  }
  card.scrollIntoView({ behavior:'smooth', block:'center' });
}

function toggleWrongWord(el) {
  if (el.classList.contains('vt-wrong')) {
    el.classList.remove('vt-wrong');
    el.style.color = 'var(--text-primary)';
    el.style.textDecoration = 'none';
    vtState.wrongWords--;
  } else {
    el.classList.add('vt-wrong');
    el.style.color = 'var(--red)';
    el.style.textDecoration = 'underline';
    vtState.wrongWords++;
  }
  const wc = document.getElementById('vtWrongCount');
  if (wc) wc.textContent = vtState.wrongWords > 0 ? `${vtState.wrongWords} word${vtState.wrongWords>1?'s':''} missed` : '';
}

function handleVTComplete() {
  const acts = document.getElementById('reciteDetailActions');
  const wrong = vtState.wrongWords;
  document.getElementById('vtTapBtn').style.display = 'none';
  if (wrong > 0) {
    acts.innerHTML = `<div style="text-align:center;font-size:14px;color:var(--text-secondary);margin-bottom:8px">${wrong} word${wrong>1?'s':''} marked wrong</div><button class="action-btn btn-pass" onclick="handlePass()">✓ I Recited It (minor mistakes)</button><button class="action-btn btn-fail" onclick="handlePracticed()">✗ Try Again Tomorrow</button>`;
  } else {
    acts.innerHTML = `<button class="action-btn btn-pass" onclick="handlePass()">✓ I Recited It Correctly</button>`;
  }
}

function handleTapNeedPractice() {
  const vv = getVersesForRecite();
  const body = document.getElementById('reciteDetailBody');
  const acts = document.getElementById('reciteDetailActions');
  // Restore scroll (car mode sets overflow:hidden; verse tap needs scroll for the passage)
  body.style.overflow = '';
  document.getElementById('reciteDetailActions').style.display = '';
  body.innerHTML = `<div style="text-align:center;padding:16px 0;font-family:var(--font-display);font-size:18px;color:var(--text-secondary);font-style:italic">Practice the passage below:</div><div class="verse-display">${vv.map(v=>`<span class="verse-num">${v.num}</span><span class="verse-text">${v.text} </span>`).join('')}</div>`;
  body.scrollTop = 0;
  acts.innerHTML = `<button class="action-btn btn-practiced" onclick="handlePracticed()">Done Practicing — Move to Tomorrow</button><button class="action-btn btn-secondary" onclick="closeReciteDetail()">Cancel</button>`;
}

function undoRecitation() {
  const pn = curPsalm;
  delete STATE.todayRecited[pn];
  const prog = STATE.psalmProgress[pn];
  if (prog && (prog.status === 'graduated' || prog.status === 'solidifying')) {
    if (prog.dayGap > 1) prog.dayGap -= 1;
    prog.nextDue = getToday();
  }
  if (STATE.recitationHistory) {
    for (let i = STATE.recitationHistory.length - 1; i >= 0; i--) {
      if (STATE.recitationHistory[i].psalm === pn) {
        STATE.recitationHistory.splice(i, 1);
        break;
      }
    }
  }
  showToast(`Psalm ${pn} — undone`);
  saveState(); renderReciteBody(false); renderRecitation();
}

// ═══════════════════════════════════════════
// MEMORIZE
// ═══════════════════════════════════════════
function renderMemorize() {
  const ct = document.getElementById('memorizeContent');
  const cm = STATE.currentMemorization;
  if (!cm||!cm.psalm) { ct.innerHTML = '<div class="empty-state">No psalm currently being memorized.</div>'; return; }
  const pd = PSALMS_DATA[cm.psalm];
  if (!pd) { ct.innerHTML = '<div class="empty-state">Psalm data not found.</div>'; return; }
  const lastV = pd.blocks[pd.blocks.length-1].endVerse;
  const nextV = cm.lastMemorizedVerse + 1;
  if (nextV > lastV) {
    ct.innerHTML = `<div class="mem-status"><div class="current-psalm">Psalm ${cm.psalm}</div><div class="current-progress">Fully memorized! 🎉</div><div class="mem-progress-bar"><div class="fill" style="width:100%"></div></div></div><div style="text-align:center;padding:20px"><button class="action-btn btn-pass" onclick="completePsalm()">Start Graduated Recitation</button></div>`;
    return;
  }
  const pct = (cm.lastMemorizedVerse/lastV*100).toFixed(0);
  let cv=null, pv=null, cBlock=null, bIdx=-1;
  for (let bi=0;bi<pd.blocks.length;bi++) {
    const bl = pd.blocks[bi];
    for (let vi=0;vi<bl.verses.length;vi++) {
      if (bl.verses[vi].num===nextV) {
        cv = bl.verses[vi]; bIdx = bi; cBlock = bl;
        if (vi>0) pv = bl.verses[vi-1];
        else if (bi>0) { const pb=pd.blocks[bi-1]; pv=pb.verses[pb.verses.length-1]; }
      }
    }
  }
  const step = cm.currentStep||1;
  const si = getStepInfo(step, cv, pv, cBlock, bIdx, pd, cm);
  let h = `<div class="mem-status"><div class="current-psalm">Psalm ${cm.psalm}</div><div class="current-progress">Through verse ${cm.lastMemorizedVerse} of ${lastV} · Next: verse ${nextV}</div><div class="mem-progress-bar"><div class="fill" style="width:${pct}%"></div></div></div>`;
  
  if (memCarMode) {
    // Car mode: flex layout, no scroll, button fills bottom
    h += `<div style="display:flex;flex-direction:column;height:calc(100vh - 220px);overflow:hidden">`;
    // Top area: step info + verse
    h += `<div style="flex-shrink:0;text-align:right;margin-bottom:4px"><button style="background:var(--accent);color:var(--bg-deep);border:1px solid var(--text-dim);border-radius:16px;padding:5px 14px;font-size:12px;font-family:var(--font-body);cursor:pointer" onclick="toggleMemCarMode()">🚗 Car Mode</button></div>`;
    h += `<div class="step-header" style="flex-shrink:0"><div class="step-num">Step ${step} of 10</div><div class="step-instruction">${si.instruction}</div></div>`;
    if (si.showVerses) {
      h += `<div class="verse-card" style="flex-shrink:1;overflow:hidden"><div class="verse-display" style="font-size:22px">`;
      for (const v of si.showVerses) h += `<span class="verse-num">${v.num}</span><span class="verse-text">${v.text} </span>`;
      h += '</div></div>';
    }
    if (si.hideContent) {
      h += `<div class="verse-card hidden-card" style="flex-shrink:0;padding:20px" id="memHiddenCard">${si.hideContent}</div>`;
      h += `<button class="action-btn btn-secondary" style="margin-top:8px;flex-shrink:0" onclick="revealMemStep()">I Need to Look</button>`;
    }
    // Button fills all remaining space
    h += `<button class="step-btn" id="memAdvBtn" style="flex:1;margin-top:8px;min-height:60px;font-size:20px" onclick="advanceStep()">Done — ${step<10?'Next Step':'Verse Memorized!'}</button>`;
    h += `</div>`;
  } else {
    // Normal mode
    h += `<div style="text-align:right;margin-bottom:8px"><button style="background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--text-dim);border-radius:16px;padding:5px 14px;font-size:12px;font-family:var(--font-body);cursor:pointer" onclick="toggleMemCarMode()">🚗 Car Mode</button></div>`;
    h += `<div class="step-header"><div class="step-num">Step ${step} of 10</div><div class="step-instruction">${si.instruction}</div></div>`;
    if (si.showVerses) {
      h += '<div class="verse-card"><div class="verse-display">';
      for (const v of si.showVerses) h += `<span class="verse-num">${v.num}</span><span class="verse-text">${v.text} </span>`;
      h += '</div></div>';
    }
    if (si.hideContent) {
      h += `<div class="verse-card hidden-card" id="memHiddenCard">${si.hideContent}</div>`;
      h += `<button class="action-btn btn-secondary" style="margin-top:12px" onclick="revealMemStep()">I Need to Look</button>`;
    }
    h += `<button class="step-btn" id="memAdvBtn" onclick="advanceStep()">Done — ${step<10?'Next Step':'Verse Memorized!'}</button>`;
  }
  ct.innerHTML = h;
}

function getStepInfo(step, cv, pv, cBlock, bIdx, pd, cm) {
  let pbv = [];
  if (bIdx>0) pbv = pd.blocks[bIdx-1].verses;
  else if (cm.psalm>1 && PSALMS_DATA[cm.psalm-1]) { const pp=PSALMS_DATA[cm.psalm-1]; pbv=pp.blocks[pp.blocks.length-1].verses; }
  let cbvu = cBlock ? cBlock.verses.filter(v=>v.num<=cv.num) : [];
  const cn = cv.num, pn = pv?pv.num:null;
  switch(step) {
    case 1: return { instruction:`Read verse ${cn} carefully. Repeat it over and over until you can say it without looking — emphasize the words you need to remember.`, showVerses:[cv] };
    case 2: return { instruction:`Recite verse ${cn} without looking`, hideContent:`Recite verse ${cn} from memory` };
    case 3: return { instruction:pn?`Recite verse ${pn}, then verse ${cn}`:`Recite verse ${cn} again`, hideContent:pn?`Recite verses ${pn}–${cn}`:`Recite verse ${cn}` };
    case 4: return { instruction:`Recite verse ${cn} by itself`, hideContent:`Recite verse ${cn}` };
    case 5: return { instruction:pn?`Recite verse ${pn}, then verse ${cn}`:`Recite verse ${cn} again`, hideContent:pn?`Recite verses ${pn}–${cn}`:`Recite verse ${cn}` };
    case 6: return { instruction:`Recite verse ${cn} by itself`, hideContent:`Recite verse ${cn}` };
    case 7: return { instruction:pn?`Recite verse ${pn}, then verse ${cn}`:`Recite verse ${cn} again`, hideContent:pn?`Recite verses ${pn}–${cn}`:`Recite verse ${cn}` };
    case 8: return { instruction:`Recite verse ${cn} by itself`, hideContent:`Recite verse ${cn}` };
    case 9: return { instruction:`Recite verse ${cn} one more time`, hideContent:`Recite verse ${cn}` };
    case 10: {
      let d='Recite ';
      if(pbv.length) d+=`previous block (v${pbv[0].num}–${pbv[pbv.length-1].num}), then `;
      d+=cbvu.length>1?`verses ${cbvu[0].num}–${cbvu[cbvu.length-1].num}`:`verse ${cn}`;
      return { instruction:d, hideContent:'Recite the full section from memory' };
    }
    default: return { instruction:'', hideContent:'' };
  }
}

let memCheated = false;

function revealMemStep() {
  memCheated = true;
  // Show the verse(s) for this step
  const cm = STATE.currentMemorization;
  const pd = PSALMS_DATA[cm.psalm];
  const nextV = cm.lastMemorizedVerse + 1;
  let cv=null, pv=null, cBlock=null, bIdx=-1;
  for (let bi=0;bi<pd.blocks.length;bi++) {
    const bl = pd.blocks[bi];
    for (let vi=0;vi<bl.verses.length;vi++) {
      if (bl.verses[vi].num===nextV) {
        cv = bl.verses[vi]; bIdx = bi; cBlock = bl;
        if (vi>0) pv = bl.verses[vi-1];
        else if (bi>0) { const pb=pd.blocks[bi-1]; pv=pb.verses[pb.verses.length-1]; }
      }
    }
  }
  const step = cm.currentStep||1;
  const si = getStepInfo(step, cv, pv, cBlock, bIdx, pd, cm);
  // Determine which verses to reveal based on the step
  let revealVerses = [];
  if (si.showVerses) revealVerses = si.showVerses;
  else if (step===2||step===4||step===6||step===8||step===9) revealVerses = [cv];
  else if ((step===3||step===5||step===7) && pv) revealVerses = [pv, cv];
  else if (step===10) {
    let pbv = [];
    if (bIdx>0) pbv = pd.blocks[bIdx-1].verses;
    else if (cm.psalm>1 && PSALMS_DATA[cm.psalm-1]) { const pp=PSALMS_DATA[cm.psalm-1]; pbv=pp.blocks[pp.blocks.length-1].verses; }
    let cbvu = cBlock ? cBlock.verses.filter(v=>v.num<=cv.num) : [];
    revealVerses = [...pbv, ...cbvu];
  }
  else revealVerses = [cv];

  const card = document.getElementById('memHiddenCard');
  if (memCarMode) {
    // Stay in car mode - re-render the whole memorize area with revealed text in car layout
    const ct = document.getElementById('memorizeContent');
    const cm2 = STATE.currentMemorization;
    const pd2 = PSALMS_DATA[cm2.psalm];
    const lastV2 = pd2.blocks[pd2.blocks.length-1].endVerse;
    const pct2 = (cm2.lastMemorizedVerse/lastV2*100).toFixed(0);
    const prevStep = Math.max(1, step - 1);
    let h2 = `<div class="mem-status"><div class="current-psalm">Psalm ${cm2.psalm}</div><div class="current-progress">Through verse ${cm2.lastMemorizedVerse} of ${lastV2} · Next: verse ${cm2.lastMemorizedVerse+1}</div><div class="mem-progress-bar"><div class="fill" style="width:${pct2}%"></div></div></div>`;
    h2 += `<div style="display:flex;flex-direction:column;height:calc(100vh - 220px);overflow:hidden">`;
    h2 += `<div style="flex-shrink:0;text-align:right;margin-bottom:4px"><button style="background:var(--accent);color:var(--bg-deep);border:1px solid var(--text-dim);border-radius:16px;padding:5px 14px;font-size:12px;font-family:var(--font-body);cursor:pointer" onclick="toggleMemCarMode()">🚗 Car Mode</button></div>`;
    h2 += `<div class="step-header" style="flex-shrink:0"><div class="step-num" style="color:var(--red)">Needed to Look</div></div>`;
    // Verse display in top area with auto-shrink
    h2 += `<div id="memCarRevealContainer" style="flex:1;display:flex;align-items:center;justify-content:center;padding:8px 12px;overflow:hidden;border:1px solid var(--red-dim);border-radius:var(--radius)"><div id="memCarRevealInner" style="font-family:var(--font-display);line-height:1.6;color:var(--text-primary);text-align:center">`;
    for (const v of revealVerses) {
      h2 += `<span style="font-weight:700;color:var(--accent);font-size:80%;vertical-align:super;margin-right:2px">${v.num}</span><span>${v.text} </span>`;
    }
    h2 += `</div></div>`;
    // Big button fills bottom
    h2 += `<button class="step-btn" style="flex:1;margin-top:8px;min-height:60px;font-size:20px;background:var(--red)" onclick="retreatStep()">I Looked — Back to Step ${prevStep}</button>`;
    h2 += `</div>`;
    ct.innerHTML = h2;
    // Auto-size the revealed text
    const container = document.getElementById('memCarRevealContainer');
    const inner = document.getElementById('memCarRevealInner');
    if (container && inner) {
      let sz = 24;
      inner.style.fontSize = sz + 'px';
      while (sz > 13 && inner.scrollHeight > container.clientHeight) {
        sz -= 1;
        inner.style.fontSize = sz + 'px';
      }
    }
    return;
  }
  if (card) {
    card.classList.remove('hidden-card');
    card.style.borderStyle = 'solid';
    card.style.borderColor = 'var(--red-dim)';
    card.innerHTML = '<div class="verse-display">' + revealVerses.map(v=>`<span class="verse-num">${v.num}</span><span class="verse-text">${v.text} </span>`).join('') + '</div>';
  }
  // Replace advance button with "go back a step" button
  const btn = document.getElementById('memAdvBtn');
  if (btn) {
    const prevStep = Math.max(1, step - 1);
    btn.textContent = `I Looked — Back to Step ${prevStep}`;
    btn.style.background = 'var(--red)';
    btn.onclick = function() { retreatStep(); };
  }
}

function retreatStep() {
  const cm = STATE.currentMemorization;
  const step = cm.currentStep||1;
  cm.currentStep = Math.max(1, step - 1);
  memCheated = false;
  showToast(`Back to step ${cm.currentStep}`);
  saveState(); renderMemorize();
}

let memCarMode = false;

function toggleMemCarMode() {
  memCarMode = !memCarMode;
  renderMemorize();
}

function advanceStep() {
  const cm = STATE.currentMemorization, step = cm.currentStep||1;
  if (step>=10) {
    cm.lastMemorizedVerse+=1;
    cm.currentStep=1;
    // Show block confirmation before moving on
    showMemBlockConfirmation(cm);
    return;
  }
  else cm.currentStep = step+1;
  memCheated = false;
  saveState(); renderMemorize(); renderRecitation();
}

function showMemBlockConfirmation(cm) {
  const ct = document.getElementById('memorizeContent');
  const pd = PSALMS_DATA[cm.psalm];
  if (!pd) return;
  // Find which block the just-memorized verse is in
  let blockVerses = [];
  for (const block of pd.blocks) {
    for (const v of block.verses) {
      if (v.num <= cm.lastMemorizedVerse && v.num >= block.startVerse) {
        blockVerses = block.verses.filter(bv => bv.num <= cm.lastMemorizedVerse);
      }
      if (v.num === cm.lastMemorizedVerse) break;
    }
  }
  let h = `<div class="mem-status"><div class="current-psalm">Psalm ${cm.psalm}</div><div class="current-progress" style="color:var(--green)">Verse ${cm.lastMemorizedVerse} memorized! ✓</div></div>`;
  h += `<div class="section-label">Current Block</div>`;
  h += '<div class="verse-card"><div class="verse-display">';
  for (const v of blockVerses) {
    h += `<span class="verse-num">${v.num}</span><span class="verse-text">${v.text} </span>`;
  }
  h += '</div></div>';
  h += `<button class="step-btn" onclick="dismissMemBlock()">Continue to Next Verse</button>`;
  ct.innerHTML = h;
  memCheated = false;
  saveState(); renderRecitation();
}

function dismissMemBlock() {
  renderMemorize();
}

function completePsalm() {
  const cm = STATE.currentMemorization, pn = cm.psalm;
  const tm = new Date(); tm.setDate(tm.getDate()+1);
  const ts = tm.getFullYear()+'-'+String(tm.getMonth()+1).padStart(2,'0')+'-'+String(tm.getDate()).padStart(2,'0');
  // Start 7-day solidification period before graduated recitation
  STATE.psalmProgress[pn] = { status:'solidifying', nextDue:ts, solidifyDay:0, dayGap:1 };
  const np = pn+1;
  if (PSALMS_DATA[np]) { cm.psalm=np; cm.lastMemorizedVerse=0; cm.currentStep=1; }
  else { cm.psalm=null; cm.lastMemorizedVerse=0; }
  showToast(`Psalm ${pn} complete! 7-day solidification begins.`);
  saveState(); renderAll();
}

// ═══════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════
function renderProgress() {
  const ct = document.getElementById('progressContent');
  const cm = STATE.currentMemorization;
  let cc=0, gc=0, mc=cm&&cm.psalm?1:0;
  for (const p of Object.values(STATE.psalmProgress)) { if(p.status==='complete')cc++; else if(p.status==='graduated')gc++; }
  let h = `<div class="stats-row"><div class="stat-box"><div class="stat-val">${cc}</div><div class="stat-label">Permanent</div></div><div class="stat-box"><div class="stat-val">${gc}</div><div class="stat-label">Graduated</div></div><div class="stat-box"><div class="stat-val">${cc+gc+mc}</div><div class="stat-label">Total</div></div></div>`;
  h += `<div class="legend"><div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Permanent</div><div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Graduated</div><div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Memorizing</div><div class="legend-item"><div class="legend-dot" style="background:var(--text-dim)"></div>Not Started</div></div>`;
  h += '<div class="progress-grid">';
  for (let i=1;i<=51;i++) {
    const p=STATE.psalmProgress[i]; let cls='',sub='';
    if(cm&&cm.psalm===i){cls='memorizing';sub=`v${cm.lastMemorizedVerse}`;}
    else if(p){if(p.status==='complete'){cls='complete';sub=`d${psalmDayOfMonth(i)}`;}else if(p.status==='graduated'){cls='graduated';sub=`${p.dayGap}d`;}else if(p.status==='solidifying'){cls='memorizing';sub=`${p.solidifyDay||0}/7`;}}
    h+=`<div class="psalm-chip ${cls}" onclick="showPsalmInfo(${i})">${i}<span class="chip-sub">${sub}</span></div>`;
  }
  h+='</div>';
  h+='<div id="psalmInfoPopup" style="display:none;background:var(--bg-card);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;text-align:center"></div>';
  
  // History section
  const history = STATE.recitationHistory || [];
  if (history.length > 0) {
    h += '<div class="section-label" style="margin-top:24px">Recitation History</div>';
    h += '<div class="settings-group">';
    // Show most recent first, up to 30
    const recent = history.slice(-30).reverse();
    for (const entry of recent) {
      const isPass = entry.result === 'pass';
      const icon = isPass ? '<span style="color:var(--green)">✓</span>' : '<span style="color:var(--red)">✗</span>';
      h += `<div class="setting-row" style="padding:10px 18px">
        <div style="display:flex;align-items:center;gap:8px">
          ${icon}
          <div>
            <div style="font-size:14px;color:var(--text-primary)">Psalm ${entry.psalm}</div>
            <div style="font-size:11px;color:var(--text-dim)">${entry.date}</div>
          </div>
        </div>
        <div style="font-size:12px;color:${isPass?'var(--accent)':'var(--red)'}">${entry.detail||''}</div>
      </div>`;
    }
    if (history.length > 30) {
      h += `<div style="padding:10px 18px;text-align:center"><button class="action-btn btn-secondary" style="padding:10px;font-size:13px" onclick="showFullHistory()">Show All ${history.length} Entries</button></div>`;
    }
    h += '</div>';
  }
  
  ct.innerHTML = h;
}

function showFullHistory() {
  const history = STATE.recitationHistory || [];
  const ct = document.getElementById('progressContent');
  let h = '<div class="section-label"><button class="action-btn btn-secondary" style="padding:8px 16px;font-size:13px" onclick="renderProgress()">← Back to Progress</button></div>';
  h += '<div class="section-label">Full Recitation History</div><div class="settings-group">';
  const all = history.slice().reverse();
  for (const entry of all) {
    const isPass = entry.result === 'pass';
    const icon = isPass ? '<span style="color:var(--green)">✓</span>' : '<span style="color:var(--red)">✗</span>';
    h += `<div class="setting-row" style="padding:10px 18px"><div style="display:flex;align-items:center;gap:8px">${icon}<div><div style="font-size:14px;color:var(--text-primary)">Psalm ${entry.psalm}</div><div style="font-size:11px;color:var(--text-dim)">${entry.date}</div></div></div><div style="font-size:12px;color:${isPass?'var(--accent)':'var(--red)'}">${entry.detail||''}</div></div>`;
  }
  h += '</div>';
  ct.innerHTML = h;
}

function showPsalmInfo(pnum) {
  const popup = document.getElementById('psalmInfoPopup');
  if (!popup) return;
  const prog = STATE.psalmProgress[pnum];
  const cm = STATE.currentMemorization;
  const pd = PSALMS_DATA[pnum];
  let info = `<div style="font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--accent);margin-bottom:6px">Psalm ${pnum}</div>`;
  if (cm && cm.psalm === pnum) {
    info += `<div style="font-size:14px;color:var(--blue)">Currently memorizing — verse ${cm.lastMemorizedVerse}</div>`;
  } else if (prog) {
    if (prog.status === 'complete') {
      info += `<div style="font-size:14px;color:var(--green)">Permanent — recite on day ${psalmDayOfMonth(pnum)} each month</div>`;
      if (prog.firstCompleted) info += `<div style="font-size:12px;color:var(--text-secondary);margin-top:4px">Since ${formatDateShort(prog.firstCompleted)}</div>`;
      if (prog.nextDue) info += `<div style="font-size:12px;color:var(--text-secondary)">Next due: ${formatDateShort(prog.nextDue)}</div>`;
    } else if (prog.status === 'graduated') {
      info += `<div style="font-size:14px;color:var(--accent)">Graduated — ${prog.dayGap} day gap</div>`;
      if (prog.nextDue) info += `<div style="font-size:12px;color:var(--text-secondary);margin-top:4px">Next due: ${formatDateShort(prog.nextDue)}</div>`;
    } else if (prog.status === 'solidifying') {
      info += `<div style="font-size:14px;color:var(--blue)">Solidifying — day ${prog.solidifyDay||0}/7</div>`;
      if (prog.nextDue) info += `<div style="font-size:12px;color:var(--text-secondary);margin-top:4px">Next due: ${formatDateShort(prog.nextDue)}</div>`;
    }
  } else {
    info += `<div style="font-size:14px;color:var(--text-dim)">Not yet started</div>`;
  }
  // Show text and edit button if psalm data exists
  if (pd) {
    info += `<div style="margin-top:12px;text-align:left;border-top:1px solid var(--border-subtle);padding-top:12px">`;
    for (const block of pd.blocks) {
      info += `<div style="margin-bottom:8px;padding:8px;background:var(--bg-surface);border-radius:6px">`;
      for (const v of block.verses) {
        info += `<div style="font-family:var(--font-display);font-size:15px;line-height:1.6;color:var(--text-primary);margin-bottom:4px"><span style="color:var(--accent);font-weight:700;font-size:12px;vertical-align:super">${v.num}</span> ${v.text}</div>`;
      }
      info += `</div>`;
    }
    info += `<button class="action-btn btn-secondary" style="margin-top:8px;padding:10px;font-size:13px" onclick="editPsalmText(${pnum})">Edit Text</button>`;
    info += `</div>`;
  }
  popup.innerHTML = info;
  popup.style.display = 'block';
  popup.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

function editPsalmText(pnum) {
  const pd = PSALMS_DATA[pnum];
  if (!pd) return;
  const popup = document.getElementById('psalmInfoPopup');
  let h = `<div style="font-family:var(--font-display);font-size:20px;font-weight:700;color:var(--accent);margin-bottom:12px">Edit Psalm ${pnum}</div>`;
  h += `<div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">Edit verse text below. Each block is a memorization card.</div>`;
  for (let bi=0;bi<pd.blocks.length;bi++) {
    const block = pd.blocks[bi];
    h += `<div style="margin-bottom:12px;padding:8px;background:var(--bg-surface);border-radius:6px">`;
    h += `<div style="font-size:11px;color:var(--accent-dim);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase">Block ${bi+1}: v${block.startVerse}–${block.endVerse}</div>`;
    for (let vi=0;vi<block.verses.length;vi++) {
      const v = block.verses[vi];
      h += `<div style="margin-bottom:6px"><span style="color:var(--accent);font-weight:700;font-size:12px">${v.num}</span> <textarea id="edit-${pnum}-${bi}-${vi}" style="width:100%;min-height:60px;background:var(--bg-card);color:var(--text-primary);border:1px solid var(--text-dim);border-radius:6px;padding:8px;font-family:var(--font-display);font-size:14px;line-height:1.5;resize:vertical">${v.text}</textarea></div>`;
    }
    h += `</div>`;
  }
  h += `<div style="display:flex;gap:8px"><button class="action-btn btn-pass" style="padding:12px;font-size:14px" onclick="savePsalmEdit(${pnum})">Save Changes</button><button class="action-btn btn-secondary" style="padding:12px;font-size:14px" onclick="showPsalmInfo(${pnum})">Cancel</button></div>`;
  popup.innerHTML = h;
}

function savePsalmEdit(pnum) {
  const pd = PSALMS_DATA[pnum];
  if (!pd) return;
  for (let bi=0;bi<pd.blocks.length;bi++) {
    for (let vi=0;vi<pd.blocks[bi].verses.length;vi++) {
      const ta = document.getElementById(`edit-${pnum}-${bi}-${vi}`);
      if (ta) pd.blocks[bi].verses[vi].text = ta.value.trim();
    }
  }
  // Save custom edits to Firebase
  if (!STATE.customPsalmEdits) STATE.customPsalmEdits = {};
  STATE.customPsalmEdits[pnum] = pd.blocks;
  saveState();
  showToast(`Psalm ${pnum} text updated`);
  showPsalmInfo(pnum);
}

// ═══════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════
function renderSettings() {
  const s = STATE.settings;
  const ct = document.getElementById('settingsContent');
  let h = '<div class="settings-group-title">Theme Mode</div><div class="settings-group"><div class="toggle-row">';
  const modes = [['auto','Auto'],['manual','Manual']];
  const isAuto = s.themeMode === 'auto';
  h += `<button class="toggle-btn ${isAuto?'active':''}" onclick="setThemeMode('auto')">Auto (System)</button>`;
  h += `<button class="toggle-btn ${!isAuto?'active':''}" onclick="setThemeMode('manual')">Manual</button>`;
  h += '</div>';
  if (isAuto) {
    h += '<div class="setting-row"><div class="setting-label">Light theme (daytime)</div></div>';
    h += '<div class="theme-grid">';
    for (const [k,v] of Object.entries(THEMES)) {
      if(v.type!=='light') continue;
      h += `<div class="theme-option ${s.lightTheme===k?'active':''}" onclick="setLightTheme('${k}')"><div class="theme-swatch" style="background:${v.swatch}"></div>${v.label}</div>`;
    }
    h += '</div>';
    h += '<div class="setting-row"><div class="setting-label">Dark theme (nighttime)</div></div>';
    h += '<div class="theme-grid">';
    for (const [k,v] of Object.entries(THEMES)) {
      if(v.type!=='dark') continue;
      h += `<div class="theme-option ${s.darkTheme===k?'active':''}" onclick="setDarkTheme('${k}')"><div class="theme-swatch" style="background:${v.swatch}"></div>${v.label}</div>`;
    }
    h += '</div>';
  } else {
    h += '<div class="setting-row"><div class="setting-label">Choose theme</div></div>';
    h += '<div class="theme-grid">';
    for (const [k,v] of Object.entries(THEMES)) {
      h += `<div class="theme-option ${s.themeMode===k?'active':''}" onclick="setManualTheme('${k}')"><div class="theme-swatch" style="background:${v.swatch}"></div>${v.label}</div>`;
    }
    h += '</div>';
  }
  h += '</div>';
  
  // Account section
  h += '<div class="settings-group-title">Account & Sync</div><div class="settings-group">';
  if (isGoogleUser) {
    const user = firebase.auth().currentUser;
    const email = user ? user.email : 'Unknown';
    h += `<div class="setting-row"><div class="setting-label">Signed in as</div><div class="setting-value">${email}</div></div>`;
    h += `<div class="setting-row"><div style="color:var(--green);font-size:13px">✓ Syncs across all your devices</div></div>`;
    h += `<div style="padding:10px 18px 14px"><button class="action-btn btn-secondary" onclick="signOut()">Sign Out</button></div>`;
  } else {
    h += `<div class="setting-row"><div class="setting-label" style="font-size:14px;line-height:1.5">Sign in with Google to sync your progress across all devices</div></div>`;
    h += `<div style="padding:10px 18px 14px"><button class="action-btn btn-practiced" onclick="signInWithGoogle()">Sign In with Google</button></div>`;
  }
  h += '</div>';
  
  h += `<div class="settings-group-title">About</div><div class="settings-group"><div class="setting-row"><div class="setting-label">Psalms HCSB Memorization</div><div class="setting-value">v3.0</div></div></div>`;
  ct.innerHTML = h;
}

function setThemeMode(mode) {
  if (mode==='auto') STATE.settings.themeMode = 'auto';
  else STATE.settings.themeMode = STATE.settings.darkTheme || 'royal-ember';
  saveState(); applyTheme(); renderSettings();
}
function setLightTheme(t) { STATE.settings.lightTheme = t; saveState(); applyTheme(); renderSettings(); }
function setDarkTheme(t) { STATE.settings.darkTheme = t; saveState(); applyTheme(); renderSettings(); }
function setManualTheme(t) { STATE.settings.themeMode = t; saveState(); applyTheme(); renderSettings(); }

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const tab = document.querySelector(`[data-tab="${name}"]`);
  if (tab) tab.classList.add('active');
  document.getElementById('screen-'+name).classList.add('active');
  if (name==='settings') renderSettings();
}

function renderAll() {
  // Apply any custom psalm edits from Firebase
  if (STATE.customPsalmEdits) {
    for (const [pnum, blocks] of Object.entries(STATE.customPsalmEdits)) {
      if (PSALMS_DATA[pnum]) PSALMS_DATA[pnum].blocks = blocks;
    }
  }
  cleanTodayRecited(); renderRecitation(); renderMemorize(); renderProgress(); renderSettings();
}

function refreshApp() {
  cleanTodayRecited();
  renderAll();
  showToast('Refreshed');
}

document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => showScreen(btn.dataset.tab)));

// ═══════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
applyTheme(); // Apply immediately before data loads

function bootApp() {
  if (typeof firebase !== 'undefined') initFirebase(); else loadFromLocal();
}
</script>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>bootApp();</script>
</body>
