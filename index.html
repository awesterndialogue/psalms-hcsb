em from all their troubles."},{"num":18,"text":"Yahweh is near the brokenhearted; He saves those crushed in spirit."}]},{"header":"Psalm 34:19\u201322 (HCSB)","startVerse":19,"endVerse":22,"verses":[{"num":19,"text":"Many adversities come to the one who is righteous, but Yahweh delivers him from them all."},{"num":20,"text":"He protects all his bones; not one of them is broken."},{"num":21,"text":"Evil brings death to the wicked, and those who hate the righteous will be punished."},{"num":22,"text":"Yahweh redeems the life of His servants, and all who take refuge in Him will not be punished."}]}]},"33":{"blocks":[{"header":"Psalm 33:1\u20135 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"Rejoice in Yahweh, you righteous ones; praise from the upright is beautiful."},{"num":2,"text":"Praise Yahweh with the lyre; make music to Him with a ten-stringed harp."},{"num":3,"text":"Sing a new song to Him; play skillfully on the strings, with a joyful shout."},{"num":4,"text":"For the word of Yahweh is right, and all His work is trustworthy."},{"num":5,"text":"He loves righteousness and justice; the earth is full of Yahweh\u2019s unfailing love."}]},{"header":"Psalm 33:6\u201312 (HCSB)","startVerse":6,"endVerse":12,"verses":[{"num":6,"text":"The heavens were made by the word of Yahweh, and all the stars, by the breath of His mouth."},{"num":7,"text":"He gathers the waters of the sea into a heap; He puts the depths into storehouses."},{"num":8,"text":"Let the whole earth tremble before Yahweh; let all the inhabitants of the world stand in awe of Him."},{"num":9,"text":"For He spoke, and it came into being; He commanded, and it came into existence."},{"num":10,"text":"Yahweh frustrates the counsel of the nations; He thwarts the plans of the peoples."},{"num":11,"text":"The counsel of Yahweh stands forever, the plans of His heart from generation to generation."},{"num":12,"text":"Happy is the nation whose God is Yahweh\u2014 the people He has chosen to be His own possession!"}]},{"header":"Psalm 33:13\u201317 (HCSB)","startVerse":13,"endVerse":17,"verses":[{"num":13,"text":"Yahweh looks down from heaven; He observes everyone."},{"num":14,"text":"He gazes on all the inhabitants of the earth from His dwelling place."},{"num":15,"text":"He alone shapes their hearts; He considers all their works."},{"num":16,"text":"A king is not saved by a large army; a warrior will not be delivered by great strength."},{"num":17,"text":"The horse is a false hope for safety; it provides no escape by its great power."}]},{"header":"Psalm 33:18\u201322 (HCSB)","startVerse":18,"endVerse":22,"verses":[{"num":18,"text":"Now the eye of Yahweh is on those who fear Him\u2014 those who depend on His faithful love"},{"num":19,"text":"to deliver them from death and to keep them alive in famine."},{"num":20,"text":"We wait for Yahweh; He is our help and shield."},{"num":21,"text":"For our hearts rejoice in Him because we trust in His holy name."},{"num":22,"text":"May Your faithful love rest on us, Yahweh, for we put our hope in You."}]}]},"35":{"blocks":[{"header":"Psalm 35:1-8 (HCSB)","startVerse":1,"endVerse":8,"verses":[{"num":1,"text":"Davidic Oppose my opponents, Yahweh; fight those who fight me."},{"num":2,"text":"Take Your shields\u2014large and small\u2014 and come to my aid."},{"num":3,"text":"Draw the spear and javelin against my pursuers, and assure me: \u201cI am your deliverance.\u201d"},{"num":4,"text":"Let those who seek to kill me be disgraced and humiliated; let those who plan to harm me be turned back and ashamed."},{"num":5,"text":"Let them be like chaff in the wind, with the angel of Yahweh driving them away."},{"num":6,"text":"Let their way be dark and slippery, with the angel of Yahweh pursuing them."},{"num":7,"text":"They hid their net for me without cause; they dug a pit for me without cause."},{"num":8,"text":"Let ruin come on him unexpectedly, and let the net that he hid ensnare him; let him fall into it\u2014to his ruin."}]},{"header":"Psalm 35:9\u201316 (HCSB)","startVerse":9,"endVerse":16,"verses":[{"num":9,"text":"Then I will rejoice in Yahweh; I will delight in His deliverance."},{"num":10,"text":"My very bones will say, \u201cYahweh, who is like You, rescuing the poor from one too strong for him, the poor or the needy from one who robs him?\u201d"},{"num":11,"text":"Malicious witnesses come forward; they question me about things I do not know."},{"num":12,"text":"They repay me evil for good, making me desolate."},{"num":13,"text":"Yet when they were sick, my clothing was sackcloth; I humbled myself with fasting, and my prayer was genuine."},{"num":14,"text":"I went about grieving as if for my friend or brother; I was bowed down with grief, like one mourning a mother."},{"num":15,"text":"But when I stumbled, they gathered in glee; they gathered against me. Assailants I did not know tore at me and did not stop."},{"num":16,"text":"With godless mockery they gnashed their teeth at me."}]},{"header":"Psalm 35:17\u201321 (HCSB)","startVerse":17,"endVerse":21,"verses":[{"num":17,"text":"Lord, how long will You look on? Rescue my life from their ravages, my only one from the young lions."},{"num":18,"text":"I will praise You in the great congregation; I will exalt You among many people."},{"num":19,"text":"Do not let my deceitful enemies rejoice over me; do not let those who hate me without cause look at me maliciously."},{"num":20,"text":"For they do not speak in friendly ways, but contrive deceitful schemes against those who live peacefully in the land."},{"num":21,"text":"They open their mouths wide against me and say, \u201cAha, aha! We saw it!\u201d"}]},{"header":"Psalm 35:22\u201328 (HCSB)","startVerse":22,"endVerse":28,"verses":[{"num":22,"text":"You saw it, Yahweh; do not be silent. Lord, do not be far from me."},{"num":23,"text":"Wake up and rise to my defense, to my cause, my God and my Yahweh!"},{"num":24,"text":"Vindicate me, Yahweh my God, in keeping with Your righteousness, and do not let them rejoice over me."},{"num":25,"text":"Do not let them say in their hearts, \u201cAha! Just what we wanted.\u201d Do not let them say, \u201cWe have swallowed him up!\u201d"},{"num":26,"text":"Let those who rejoice at my misfortune be disgraced and humiliated; let those who exalt themselves over me be clothed with shame and reproach."},{"num":27,"text":"Let those who want my vindication shout for joy and be glad; let them continually say, \u201cYahweh be exalted. He takes pleasure in His servant\u2019s well-being.\u201d"},{"num":28,"text":"And my tongue will proclaim Your righteousness, Your praise all day long."}]}]},"36":{"blocks":[{"header":"Psalm 36:1-4 (HCSB)","startVerse":1,"endVerse":4,"verses":[{"num":1,"text":"For the choir director. A psalm of David, Yahweh\u2019s servant An oracle within my heart concerning the transgression of the wicked person: There is no dread of God before his eyes,"},{"num":2,"text":"for in his own eyes he flatters himself too much to discover and hate his sin."},{"num":3,"text":"The words of his mouth are malicious and deceptive; he has stopped acting wisely and doing good."},{"num":4,"text":"Even on his bed he makes malicious plans. He sets himself on a path that is not good and does not reject evil."}]},{"header":"Psalm 36:5\u201312 (HCSB)","startVerse":5,"endVerse":12,"verses":[{"num":5,"text":"Yahweh, Your faithful love reaches to heaven, Your faithfulness to the clouds."},{"num":6,"text":"Your righteousness is like the highest mountains; Your judgments, like the deepest sea. Yahweh, You preserve man and beast."},{"num":7,"text":"God, Your faithful love is so valuable that people take refuge in the shadow of Your wings."},{"num":8,"text":"They are filled from the abundance of Your house; You let them drink from Your refreshing stream,"},{"num":9,"text":"for with You is life\u2019s fountain. In Your light we will see light."},{"num":10,"text":"Spread Your faithful love over those who know You, and Your righteousness over the upright in heart."},{"num":11,"text":"Do not let the foot of the arrogant man come near me or the hand of the wicked one drive me away."},{"num":12,"text":"There the evildoers fall; they have been thrown down and cannot rise."}]}]},"37":{"blocks":[{"header":"Psalm 37:1-6 (HCSB)","startVerse":1,"endVerse":6,"verses":[{"num":1,"text":"Davidic Do not be agitated by evildoers; do not envy those who do wrong."},{"num":2,"text":"For they wither quickly like grass and wilt like tender green plants."},{"num":3,"text":"Trust in Yahweh and do what is good; dwell in the land and live securely."},{"num":4,"text":"Take delight in Yahweh, and He will give you your heart\u2019s desires."},{"num":5,"text":"Commit your way to Yahweh; trust in Him, and He will act,"},{"num":6,"text":"making your righteousness shine like the dawn, your justice like the noonday."}]},{"header":"Psalm 37:7\u20139 (HCSB)","startVerse":7,"endVerse":9,"verses":[{"num":7,"text":"Be silent before Yahweh and wait expectantly for Him; do not be agitated by one who prospers in his way, by the man who carries out evil plans."},{"num":8,"text":"Refrain from anger and give up your rage; do not be agitated\u2014it can only bring harm."},{"num":9,"text":"For evildoers will be destroyed, but those who put their hope in Yahweh will inherit the land."}]},{"header":"Psalm 37:10\u201313 (HCSB)","startVerse":10,"endVerse":13,"verses":[{"num":10,"text":"A little while, and the wicked person will be no more; though you look for him, he will not be there."},{"num":11,"text":"But the humble will inherit the land and will enjoy abundant prosperity."},{"num":12,"text":"The wicked person schemes against the righteous and gnashes his teeth at him."},{"num":13,"text":"The Lord laughs at him because He sees that his day is coming."}]},{"header":"Psalm 37:14\u201319 (HCSB)","startVerse":14,"endVerse":19,"verses":[{"num":14,"text":"The wicked have drawn the sword and strung the bow to bring down the afflicted and needy and to slaughter those whose way is upright."},{"num":15,"text":"Their swords will enter their own hearts, and their bows will be broken."},{"num":16,"text":"The little that the righteous man has is better than the abundance of many wicked people."},{"num":17,"text":"For the arms of the wicked will be broken, but Yahweh supports the righteous."},{"num":18,"text":"Yahweh watches over the blameless all their days, and their inheritance will last forever."},{"num":19,"text":"They will not be disgraced in times of adversity; they will be satisfied in days of hunger."}]},{"header":"Psalm 37:20\u201326 (HCSB)","startVerse":20,"endVerse":26,"verses":[{"num":20,"text":"But the wicked will perish; Yahweh\u2019s enemies, like the glory of the pastures, will fade away\u2014 they will fade away like smoke."},{"num":21,"text":"The wicked man borrows and does not repay, but the righteous one is gracious and giving."},{"num":22,"text":"Those who are blessed by Him will inherit the land, but those cursed by Him will be destroyed."},{"num":23,"text":"A man\u2019s steps are established by Yahweh, and He takes pleasure in his way."},{"num":24,"text":"Though he falls, he will not be overwhelmed, because Yahweh holds his hand."},{"num":25,"text":"I have been young and now I am old, yet I have not seen the righteous abandoned or his children begging for bread."},{"num":26,"text":"He is always generous, always lending, and his children are a blessing."}]},{"header":"Psalm 37:27\u201331 (HCSB)","startVerse":27,"endVerse":31,"verses":[{"num":27,"text":"Turn away from evil and do what is good, and dwell there forever."},{"num":28,"text":"For Yahweh loves justice and will not abandon His faithful ones. They are kept safe forever, but the children of the wicked will be destroyed."},{"num":29,"text":"The righteous will inherit the land and dwell in it permanently."},{"num":30,"text":"The mouth of the righteous utters wisdom; his tongue speaks what is just."},{"num":31,"text":"The instruction of his God is in his heart; his steps do not falter."}]},{"header":"Psalm 37:32\u201336 (HCSB)","startVerse":32,"endVerse":36,"verses":[{"num":32,"text":"The wicked one lies in wait for the righteous and seeks to kill him;"},{"num":33,"text":"Yahweh will not leave him in the power of the wicked one or allow him to be condemned when he is judged."},{"num":34,"text":"Wait for Yahweh and keep His way, and He will exalt you to inherit the land. You will watch when the wicked are destroyed."},{"num":35,"text":"I have seen a wicked, violent man well-rooted like a flourishing native tree."},{"num":36,"text":"Then I passed by and noticed he was gone; I searched for him, but he could not be found."}]},{"header":"Psalm 37:37\u201340 (HCSB)","startVerse":37,"endVerse":40,"verses":[{"num":37,"text":"Watch the blameless and observe the upright, for the man of peace will have a future."},{"num":38,"text":"But transgressors will all be eliminated; the future of the wicked will be destroyed."},{"num":39,"text":"The salvation of the righteous is from Yahweh, their refuge in a time of distress."},{"num":40,"text":"Yahweh helps and delivers them; He will deliver them from the wicked and will save them because they take refuge in Him."}]}]},"38":{"blocks":[{"header":"Psalm 38:1-8 (HCSB)","startVerse":1,"endVerse":8,"verses":[{"num":1,"text":"A Davidic psalm for remembrance Yahweh, do not punish me in Your anger or discipline me in Your wrath."},{"num":2,"text":"For Your arrows have sunk into me, and Your hand has pressed down on me."},{"num":3,"text":"There is no health in my body because of Your indignation; there is no strength in my bones because of my sin."},{"num":4,"text":"For my sins have flooded over my head; they are a burden too heavy for me to bear."},{"num":5,"text":"My wounds are foul and festering because of my foolishness."},{"num":6,"text":"I am bent over and brought low; all day long I go around in mourning."},{"num":7,"text":"For my loins are full of burning pain, and there is no health in my body."},{"num":8,"text":"I am faint and severely crushed; I groan because of the anguish of my heart."}]},{"header":"Psalm 38:9\u201312 (HCSB)","startVerse":9,"endVerse":12,"verses":[{"num":9,"text":"Lord, my every desire is known to You; my sighing is not hidden from You."},{"num":10,"text":"My heart races, my strength leaves me, and even the light of my eyes has faded."},{"num":11,"text":"My loved ones and friends stand back from my affliction, and my relatives stand at a distance."},{"num":12,"text":"Those who seek my life set traps, and those who want to harm me threaten to destroy me; they plot treachery all day long."}]},{"header":"Psalm 38:13\u201320 (HCSB)","startVerse":13,"endVerse":20,"verses":[{"num":13,"text":"I am like a deaf person; I do not hear. I am like a speechless person who does not open his mouth."},{"num":14,"text":"I am like a man who does not hear and has no arguments in his mouth."},{"num":15,"text":"I put my hope in You, Yahweh; You will answer, Lord my God."},{"num":16,"text":"For I said, \u201cDon\u2019t let them rejoice over me\u2014 those who are arrogant toward me when I stumble.\u201d"},{"num":17,"text":"For I am about to fall, and my pain is constantly with me."},{"num":18,"text":"So I confess my guilt; I am anxious because of my sin."},{"num":19,"text":"But my enemies are vigorous and powerful; many hate me for no reason."},{"num":20,"text":"Those who repay evil for good attack me for pursuing good."}]},{"header":"Psalm 38:21\u201322 (HCSB)","startVerse":21,"endVerse":22,"verses":[{"num":21,"text":"Yahweh, do not abandon me; my God, do not be far from me."},{"num":22,"text":"Hurry to help me, Lord, my Savior."}]}]},"40":{"blocks":[{"header":"Psalm 40:1-5 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"For the choir director. A Davidic psalm I waited patiently for Yahweh, and He turned to me and heard my cry for help."},{"num":2,"text":"He brought me up from a desolate pit, out of the muddy clay, and set my feet on a rock, making my steps secure."},{"num":3,"text":"He put a new song in my mouth, a hymn of praise to our God. Many will see and fear and put their trust in Yahweh."},{"num":4,"text":"How happy is the man who has put his trust in Yahweh and has not turned to the proud or to those who run after lies!"},{"num":5,"text":"Yahweh my God, You have done many things\u2014 Your wonderful works and Your plans for us; none can compare with You. If I were to report and speak of them, they are more than can be told."}]},{"header":"Psalm 40:6\u201310 (HCSB)","startVerse":6,"endVerse":10,"verses":[{"num":6,"text":"You do not delight in sacrifice and offering; You open my ears to listen. You do not ask for a whole burnt offering or a sin offering."},{"num":7,"text":"Then I said, \u201cSee, I have come; it is written about me in the volume of the scroll."},{"num":8,"text":"I delight to do Your will, my God; Your instruction lives within me.\u201d"},{"num":9,"text":"I proclaim righteousness in the great assembly; see, I do not keep my mouth closed \u2014 as You know, Yahweh."},{"num":10,"text":"I did not hide Your righteousness in my heart; I spoke about Your faithfulness and salvation; I did not conceal Your constant love and truth from the great assembly."}]},{"header":"Psalm 40:11\u201313 (HCSB)","startVerse":11,"endVerse":13,"verses":[{"num":11,"text":"Yahweh, do not withhold Your compassion from me; Your constant love and truth will always guard me."},{"num":12,"text":"For troubles without number have surrounded me; my sins have overtaken me; I am unable to see. They are more than the hairs of my head, and my courage leaves me."},{"num":13,"text":"Yahweh, be pleased to deliver me; hurry to help me, Yahweh."}]},{"header":"Psalm 40:14\u201317 (HCSB)","startVerse":14,"endVerse":17,"verses":[{"num":14,"text":"Let those who seek to take my life be disgraced and confounded. Let those who wish me harm be driven back and humiliated."},{"num":15,"text":"Let those who say to me, \u201cAha, aha!\u201d be horrified because of their shame."},{"num":16,"text":"Let all who seek You rejoice and be glad in You; let those who love Your salvation continually say, \u201cYahweh is great!\u201d"},{"num":17,"text":"I am afflicted and needy; the Lord thinks of me. You are my helper and my deliverer; my God, do not delay."}]}]},"39":{"blocks":[{"header":"Psalm 39:1-5 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"For the choir director, for Jeduthun. A Davidic psalm I said, \u201cI will guard my ways so that I may not sin with my tongue; I will guard my mouth with a muzzle as long as the wicked are in my presence.\u201d"},{"num":2,"text":"I was speechless and quiet; I kept silent, even from speaking good, and my pain intensified."},{"num":3,"text":"My heart grew hot within me; as I mused, a fire burned. I spoke with my tongue:"},{"num":4,"text":"\u201cYahweh, reveal to me the end of my life and the number of my days. Let me know how short-lived I am."},{"num":5,"text":"You, indeed, have made my days short in length, and my life span as nothing in Your sight. Yes, every mortal man is only a vapor. Selah"}]},{"header":"Psalm 39:6\u201313 (HCSB)","startVerse":6,"endVerse":13,"verses":[{"num":6,"text":"\u201cCertainly, man walks about like a mere shadow. Indeed, they frantically rush around in vain, gathering possessions without knowing who will get them."},{"num":7,"text":"Now, Lord, what do I wait for? My hope is in You."},{"num":8,"text":"Deliver me from all my transgressions; do not make me the taunt of fools."},{"num":9,"text":"I am speechless; I do not open my mouth because of what You have done."},{"num":10,"text":"Remove Your torment from me; I fade away because of the force of Your hand."},{"num":11,"text":"You discipline a man with punishment for sin, consuming like a moth what is precious to him; every man is only a vapor. Selah"},{"num":12,"text":"\u201cHear my prayer, Yahweh, and listen to my cry for help; do not be silent at my tears. For I am a foreigner residing with You, a temporary resident like all my fathers."},{"num":13,"text":"Turn Your angry gaze from me so that I may be cheered up before I die and am gone.\u201d"}]}]},"42":{"blocks":[{"header":"Psalm 42:1-4 (HCSB)","startVerse":1,"endVerse":4,"verses":[{"num":1,"text":"For the choir director. A Maskil of the sons of Korah As a deer longs for streams of water, so I long for You, God."},{"num":2,"text":"I thirst for God, the living God. When can I come and appear before God?"},{"num":3,"text":"My tears have been my food day and night, while all day long people say to me, \u201cWhere is your God?\u201d"},{"num":4,"text":"I remember this as I pour out my heart: how I walked with many, leading the festive procession to the house of God, with joyful and thankful shouts. Book II ("}]},{"header":"Psalm 42:5\u201311 (HCSB)","startVerse":5,"endVerse":11,"verses":[{"num":5,"text":"Why am I so depressed? Why this turmoil within me? Put your hope in God, for I will still praise Him, my Savior and my God."},{"num":6,"text":"I am deeply depressed; therefore I remember You from the land of Jordan and the peaks of Hermon, from Mount Mizar."},{"num":7,"text":"Deep calls to deep in the roar of Your waterfalls; all Your breakers and Your billows have swept over me."},{"num":8,"text":"Yahweh will send His faithful love by day; His song will be with me in the night\u2014 a prayer to the God of my life."},{"num":9,"text":"I will say to God, my rock, \u201cWhy have You forgotten me? Why must I go about in sorrow because of the enemy\u2019s oppression?\u201d"},{"num":10,"text":"My adversaries taunt me, as if crushing my bones, while all day long they say to me, \u201cWhere is your God?\u201d"},{"num":11,"text":"Why am I so depressed? Why this turmoil within me? Put your hope in God, for I will still praise Him, my Savior and my God."}]}]},"43":{"blocks":[{"header":"Psalm 43:1\u20132 (HCSB)","startVerse":1,"endVerse":2,"verses":[{"num":1,"text":"Vindicate me, God, and defend my cause against an ungodly nation; rescue me from the deceitful and unjust man."},{"num":2,"text":"For You are the God of my refuge. Why have You rejected me? Why must I go about in sorrow because of the enemy\u2019s oppression?"}]},{"header":"Psalm 43:3\u20135 (HCSB)","startVerse":3,"endVerse":5,"verses":[{"num":3,"text":"Send Your light and Your truth; let them lead me. Let them bring me to Your holy mountain, to Your dwelling place."},{"num":4,"text":"Then I will come to the altar of God, to God, my greatest joy. I will praise You with the lyre, God, my God."},{"num":5,"text":"Why am I so depressed? Why this turmoil within me? Put your hope in God, for I will still praise Him, my Savior and my God."}]}]},"41":{"blocks":[{"header":"Psalm 41:1-3 (HCSB)","startVerse":1,"endVerse":3,"verses":[{"num":1,"text":"For the choir director. A Davidic psalm Happy is one who cares for the poor; Yahweh will save him in a day of adversity."},{"num":2,"text":"Yahweh will keep him and preserve him; he will be blessed in the land. You will not give him over to the desire of his enemies."},{"num":3,"text":"Yahweh will sustain him on his sickbed; You will heal him on the bed where he lies."}]},{"header":"Psalm 41:4\u20139 (HCSB)","startVerse":4,"endVerse":9,"verses":[{"num":4,"text":"I said, \u201cYahweh, be gracious to me; heal me, for I have sinned against You.\u201d"},{"num":5,"text":"My enemies speak maliciously about me: \u201cWhen will he die and be forgotten?\u201d"},{"num":6,"text":"When one of them comes to visit, he speaks deceitfully; he stores up evil in his heart; he goes out and talks."},{"num":7,"text":"All who hate me whisper together about me; they plan to harm me."},{"num":8,"text":"\u201cLethal poison has been poured into him, and he won\u2019t rise again from where he lies!\u201d"},{"num":9,"text":"Even my friend in whom I trusted, one who ate my bread, has raised his heel against me."}]},{"header":"Psalm 41:10\u201312 (HCSB)","startVerse":10,"endVerse":12,"verses":[{"num":10,"text":"But You, Yahweh, be gracious to me and raise me up; then I will repay them."},{"num":11,"text":"By this I know that You delight in me: my enemy does not shout in triumph over me."},{"num":12,"text":"You supported me because of my integrity and set me in Your presence forever."}]},{"header":"Psalm 41:13 (HCSB)","startVerse":13,"endVerse":13,"verses":[{"num":13,"text":"May Yahweh, the God of Israel, be praised from everlasting to everlasting. Amen and amen."}]}]},"45":{"blocks":[{"header":"Psalm 45:1-5 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"For the choir director: according to \u201cThe Lilies.\u201d A Maskil of the sons of Korah. A love song My heart is moved by a noble theme as I recite my verses to the king; my tongue is the pen of a skillful writer."},{"num":2,"text":"You are the most handsome of men; grace flows from your lips. Therefore God has blessed you forever."},{"num":3,"text":"Mighty warrior, strap your sword at your side. In your majesty and splendor \u2014"},{"num":4,"text":"in your splendor ride triumphantly in the cause of truth, humility, and justice. May your right hand show your awe-inspiring acts."},{"num":5,"text":"Your arrows pierce the hearts of the king\u2019s enemies; the peoples fall under you."}]},{"header":"Psalm 45:6\u20139 (HCSB)","startVerse":6,"endVerse":9,"verses":[{"num":6,"text":"Your throne, God, is forever and ever; the scepter of Your kingdom is a scepter of justice."},{"num":7,"text":"You love righteousness and hate wickedness; therefore God, your God, has anointed you with the oil of joy more than your companions."},{"num":8,"text":"Myrrh, aloes, and cassia perfume all your garments; from ivory palaces harps bring you joy."},{"num":9,"text":"Kings\u2019 daughters are among your honored women; the queen, adorned with gold from Ophir, stands at your right hand."}]},{"header":"Psalm 45:10\u201315 (HCSB)","startVerse":10,"endVerse":15,"verses":[{"num":10,"text":"Listen, daughter, pay attention and consider: forget your people and your father\u2019s house,"},{"num":11,"text":"and the king will desire your beauty. Bow down to him, for he is your lord."},{"num":12,"text":"The daughter of Tyre, the wealthy people, will seek your favor with gifts."},{"num":13,"text":"In her chamber, the royal daughter is all glorious, her clothing embroidered with gold."},{"num":14,"text":"In colorful garments she is led to the king; after her, the virgins, her companions, are brought to you."},{"num":15,"text":"They are led in with gladness and rejoicing; they enter the king\u2019s palace."}]},{"header":"Psalm 45:16\u201317 (HCSB)","startVerse":16,"endVerse":17,"verses":[{"num":16,"text":"Your sons will succeed your ancestors; you will make them princes throughout the land."},{"num":17,"text":"I will cause your name to be remembered for all generations; therefore the peoples will praise you forever and ever."}]}]},"44":{"blocks":[{"header":"Psalm 44:1-8 (HCSB)","startVerse":1,"endVerse":8,"verses":[{"num":1,"text":"For the choir director. A Maskil of the sons of Korah God, we have heard with our ears\u2014 our ancestors have told us\u2014 the work You accomplished in their days, in days long ago:"},{"num":2,"text":"to plant them, You drove out the nations with Your hand; to settle them, You crushed the peoples."},{"num":3,"text":"For they did not take the land by their sword\u2014 their arm did not bring them victory\u2014 but by Your right hand, Your arm, and the light of Your face, for You were pleased with them."},{"num":4,"text":"You are my King, my God, who ordains victories for Jacob."},{"num":5,"text":"Through You we drive back our foes; through Your name we trample our enemies."},{"num":6,"text":"For I do not trust in my bow, and my sword does not bring me victory."},{"num":7,"text":"But You give us victory over our foes and let those who hate us be disgraced."},{"num":8,"text":"We boast in God all day long; we will praise Your name forever. Selah"}]},{"header":"Psalm 44:9\u201316 (HCSB)","startVerse":9,"endVerse":16,"verses":[{"num":9,"text":"But You have rejected and humiliated us; You do not march out with our armies."},{"num":10,"text":"You make us retreat from the foe, and those who hate us have taken plunder for themselves."},{"num":11,"text":"You hand us over to be eaten like sheep and scatter us among the nations."},{"num":12,"text":"You sell Your people for nothing; You make no profit from selling them."},{"num":13,"text":"You make us an object of reproach to our neighbors, a source of mockery and ridicule to those around us."},{"num":14,"text":"You make us a joke among the nations, a laughingstock among the peoples."},{"num":15,"text":"My disgrace is before me all day long, and shame has covered my face,"},{"num":16,"text":"because of the voice of the scorner and reviler, because of the enemy and avenger."}]},{"header":"Psalm 44:17\u201322 (HCSB)","startVerse":17,"endVerse":22,"verses":[{"num":17,"text":"All this has happened to us, but we have not forgotten You or betrayed Your covenant."},{"num":18,"text":"Our hearts have not turned back; our steps have not strayed from Your path."},{"num":19,"text":"But You have crushed us in a haunt of jackals and have covered us with deepest darkness."},{"num":20,"text":"If we had forgotten the name of our God and spread out our hands to a foreign god,"},{"num":21,"text":"wouldn\u2019t God have found this out, since He knows the secrets of the heart?"},{"num":22,"text":"Because of You we are slain all day long; we are counted as sheep to be slaughtered."}]},{"header":"Psalm 44:23\u201326 (HCSB)","startVerse":23,"endVerse":26,"verses":[{"num":23,"text":"Wake up, Yahweh! Why are You sleeping? Get up! Don\u2019t reject us forever!"},{"num":24,"text":"Why do You hide Yourself and forget our affliction and oppression?"},{"num":25,"text":"For we have sunk down to the dust; our bodies cling to the ground."},{"num":26,"text":"Rise up! Help us! Redeem us because of Your faithful love."}]}]},"48":{"blocks":[{"header":"Psalm 48:1-8 (HCSB)","startVerse":1,"endVerse":8,"verses":[{"num":1,"text":"A song. A psalm of the sons of Korah Yahweh is great and highly praised in the city of our God. His holy mountain,"},{"num":2,"text":"rising splendidly, is the joy of the whole earth. Mount Zion on the slopes of the north is the city of the great King."},{"num":3,"text":"God is known as a stronghold in its citadels."},{"num":4,"text":"Look! The kings assembled; they advanced together."},{"num":5,"text":"They looked and froze with fear; they fled in terror."},{"num":6,"text":"Trembling seized them there, agony like that of a woman in labor,"},{"num":7,"text":"as You wrecked the ships of Tarshish with the east wind."},{"num":8,"text":"Just as we heard, so we have seen in the city of Yahweh of Hosts, in the city of our God; God will establish it forever. Selah"}]},{"header":"Psalm 48:9\u201314 (HCSB)","startVerse":9,"endVerse":14,"verses":[{"num":9,"text":"God, within Your temple, we contemplate Your faithful love."},{"num":10,"text":"Your name, God, like Your praise, reaches to the ends of the earth; Your right hand is filled with justice."},{"num":11,"text":"Mount Zion is glad. The towns of Judah rejoice because of Your judgments."},{"num":12,"text":"Go around Zion, encircle it; count its towers,"},{"num":13,"text":"note its ramparts; tour its citadels so that you can tell a future generation:"},{"num":14,"text":"\u201cThis God, our God forever and ever\u2014 He will always lead us.\u201d"}]}]},"49":{"blocks":[{"header":"Psalm 49:1-9 (HCSB)","startVerse":1,"endVerse":9,"verses":[{"num":1,"text":"For the choir director. A psalm of the sons of Korah Hear this, all you peoples; listen, all who inhabit the world,"},{"num":2,"text":"both low and high, rich and poor together."},{"num":3,"text":"My mouth speaks wisdom; my heart\u2019s meditation brings understanding."},{"num":4,"text":"I turn my ear to a proverb; I explain my riddle with a lyre."},{"num":5,"text":"Why should I fear in times of trouble? The iniquity of my foes surrounds me."},{"num":6,"text":"They trust in their wealth and boast of their abundant riches."},{"num":7,"text":"Yet these cannot redeem a person or pay his ransom to God \u2014"},{"num":8,"text":"since the price of redeeming him is too costly, one should forever stop trying \u2014"},{"num":9,"text":"so that he may live forever and not see the Pit."}]},{"header":"Psalm 49:10\u201320 (HCSB)","startVerse":10,"endVerse":20,"verses":[{"num":10,"text":"For one can see that wise men die; foolish and stupid men also pass away. Then they leave their wealth to others."},{"num":11,"text":"Their graves are their eternal homes, their homes from generation to generation, though they have named estates after themselves."},{"num":12,"text":"But despite his assets, man will not last; he is like the animals that perish."},{"num":13,"text":"This is the way of those who are arrogant, and of their followers, who approve of their words. Selah"},{"num":14,"text":"Like sheep they are headed for Sheol; Death will shepherd them. The upright will rule over them in the morning, and their form will waste away in Sheol, far from their lofty abode."},{"num":15,"text":"But God will redeem my life from the power of Sheol, for He will take me. Selah"},{"num":16,"text":"Do not be afraid when a man gets rich, when the wealth of his house increases."},{"num":17,"text":"For when he dies, he will take nothing at all; his wealth will not follow him down."},{"num":18,"text":"Though he praises himself during his lifetime\u2014 and people praise you when you do well for yourself \u2014"},{"num":19,"text":"he will go to the generation of his fathers; they will never see the light."},{"num":20,"text":"A man with valuable possessions but without understanding is like the animals that perish."}]}]},"47":{"blocks":[{"header":"Psalm 47:1-4 (HCSB)","startVerse":1,"endVerse":4,"verses":[{"num":1,"text":"For the choir director. A psalm of the sons of Korah Clap your hands, all you peoples; shout to God with a jubilant cry."},{"num":2,"text":"For Yahweh, the Most High, is awe-inspiring, a great King over all the earth."},{"num":3,"text":"He subdues peoples under us and nations under our feet."},{"num":4,"text":"He chooses for us our inheritance\u2014 the pride of Jacob, whom He loves. Selah"}]},{"header":"Psalm 47:5\u20139 (HCSB)","startVerse":5,"endVerse":9,"verses":[{"num":5,"text":"God ascends among shouts of joy, Yahweh, among the sound of trumpets."},{"num":6,"text":"Sing praise to God, sing praise; sing praise to our King, sing praise!"},{"num":7,"text":"Sing a song of wisdom, for God is King of all the earth."},{"num":8,"text":"God reigns over the nations; God is seated on His holy throne."},{"num":9,"text":"The nobles of the peoples have assembled with the people of the God of Abraham. For the leaders of the earth belong to God; He is greatly exalted."}]}]},"46":{"blocks":[{"header":"Psalm 46:1-7 (HCSB)","startVerse":1,"endVerse":7,"verses":[{"num":1,"text":"For the choir director. A song of the sons of Korah. According to Alamoth God is our refuge and strength, a helper who is always found in times of trouble."},{"num":2,"text":"Therefore we will not be afraid, though the earth trembles and the mountains topple into the depths of the seas,"},{"num":3,"text":"though its waters roar and foam and the mountains quake with its turmoil. Selah"},{"num":4,"text":"There is a river\u2014 its streams delight the city of God, the holy dwelling place of the Most High."},{"num":5,"text":"God is within her; she will not be toppled. God will help her when the morning dawns."},{"num":6,"text":"Nations rage, kingdoms topple; the earth melts when He lifts His voice."},{"num":7,"text":"Yahweh of Hosts is with us; the God of Jacob is our stronghold. Selah"}]},{"header":"Psalm 46:8\u201311 (HCSB)","startVerse":8,"endVerse":11,"verses":[{"num":8,"text":"Come, see the works of Yahweh, who brings devastation on the earth."},{"num":9,"text":"He makes wars cease throughout the earth. He shatters bows and cuts spears to pieces; He burns up the chariots."},{"num":10,"text":"\u201cStop your fighting\u2014and know that I am God, exalted among the nations, exalted on the earth.\u201d"},{"num":11,"text":"Yahweh of Hosts is with us; the God of Jacob is our stronghold. Selah"}]}]},"51":{"blocks":[{"header":"Psalm 51:1-5 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"For the choir director. A Davidic psalm, when Nathan the prophet came to him after he had gone to Bathsheba Be gracious to me, God, according to Your faithful love; according to Your abundant compassion, blot out my rebellion."},{"num":2,"text":"Wash away my guilt and cleanse me from my sin."},{"num":3,"text":"For I am conscious of my rebellion, and my sin is always before me."},{"num":4,"text":"Against You\u2014You alone\u2014I have sinned and done this evil in Your sight. So You are right when You pass sentence; You are blameless when You judge."},{"num":5,"text":"Indeed, I was guilty when I was born; I was sinful when my mother conceived me."}]},{"header":"Psalm 51:6\u20139 (HCSB)","startVerse":6,"endVerse":9,"verses":[{"num":6,"text":"Surely You desire integrity in the inner self, and You teach me wisdom deep within."},{"num":7,"text":"Purify me with hyssop, and I will be clean; wash me, and I will be whiter than snow."},{"num":8,"text":"Let me hear joy and gladness; let the bones You have crushed rejoice."},{"num":9,"text":"Turn Your face away from my sins and blot out all my guilt."}]},{"header":"Psalm 51:10\u201313 (HCSB)","startVerse":10,"endVerse":13,"verses":[{"num":10,"text":"God, create a clean heart for me and renew a steadfast spirit within me."},{"num":11,"text":"Do not banish me from Your presence or take Your Holy Spirit from me."},{"num":12,"text":"Restore the joy of Your salvation to me, and give me a willing spirit."},{"num":13,"text":"Then I will teach the rebellious Your ways, and sinners will return to You."}]},{"header":"Psalm 51:14\u201319 (HCSB)","startVerse":14,"endVerse":19,"verses":[{"num":14,"text":"Save me from the guilt of bloodshed, God, the God of my salvation, and my tongue will sing of Your righteousness."},{"num":15,"text":"Lord, open my lips, and my mouth will declare Your praise."},{"num":16,"text":"You do not want a sacrifice, or I would give it; You are not pleased with a burnt offering."},{"num":17,"text":"The sacrifice pleasing to God is a broken spirit. God, You will not despise a broken and humbled heart."},{"num":18,"text":"In Your good pleasure, cause Zion to prosper; build the walls of Jerusalem."},{"num":19,"text":"Then You will delight in righteous sacrifices, whole burnt offerings; then bulls will be offered on Your altar."}]}]},"50":{"blocks":[{"header":"Psalm 50:1-6 (HCSB)","startVerse":1,"endVerse":6,"verses":[{"num":1,"text":"A psalm of Asaph Yahweh, the God of gods speaks; He summons the earth from east to west."},{"num":2,"text":"From Zion, the perfection of beauty, God appears in radiance."},{"num":3,"text":"Our God is coming; He will not be silent! Devouring fire precedes Him, and a storm rages around Him."},{"num":4,"text":"On high, He summons heaven and earth in order to judge His people."},{"num":5,"text":"\u201cGather My faithful ones to Me, those who made a covenant with Me by sacrifice.\u201d"},{"num":6,"text":"The heavens proclaim His righteousness, for God is the Judge. Selah"}]},{"header":"Psalm 50:7\u201315 (HCSB)","startVerse":7,"endVerse":15,"verses":[{"num":7,"text":"\u201cListen, My people, and I will speak; I will testify against you, Israel. I am God, your God."},{"num":8,"text":"I do not rebuke you for your sacrifices or for your burnt offerings, which are continually before Me."},{"num":9,"text":"I will not accept a bull from your household or male goats from your pens,"},{"num":10,"text":"for every animal of the forest is Mine, the cattle on a thousand hills."},{"num":11,"text":"I know every bird of the mountains, and the creatures of the field are Mine."},{"num":12,"text":"If I were hungry, I would not tell you, for the world and everything in it is Mine."},{"num":13,"text":"Do I eat the flesh of bulls or drink the blood of goats?"},{"num":14,"text":"Sacrifice a thank offering to God, and pay your vows to the Most High."},{"num":15,"text":"Call on Me in a day of trouble; I will rescue you, and you will honor Me.\u201d"}]},{"header":"Psalm 50:16\u201321 (HCSB)","startVerse":16,"endVerse":21,"verses":[{"num":16,"text":"But God says to the wicked: \u201cWhat right do you have to recite My statutes and to take My covenant on your lips?"},{"num":17,"text":"You hate instruction and turn your back on My words."},{"num":18,"text":"When you see a thief, you make friends with him, and you associate with adulterers."},{"num":19,"text":"You unleash your mouth for evil and harness your tongue for deceit."},{"num":20,"text":"You sit, maligning your brother, slandering your mother\u2019s son."},{"num":21,"text":"You have done these things, and I kept silent; you thought I was just like you. But I will rebuke you and lay out the case before you."}]},{"header":"Psalm 50:22\u201323 (HCSB)","startVerse":22,"endVerse":23,"verses":[{"num":22,"text":"\u201cUnderstand this, you who forget God, or I will tear you apart, and there will be no one to rescue you."},{"num":23,"text":"Whoever sacrifices a thank offering honors Me, and whoever orders his conduct, I will show him the salvation of God.\u201d"}]}]}};

let STATE = null;

function getToday() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function getDayOfMonth() { return new Date().getDate(); }
function formatDateShort(ds) {
  if(!ds) return '';
  const d = new Date(ds+'T12:00:00');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()]+' '+d.getDate();
}
function psalmDayOfMonth(n) { let d = n % 30; return d === 0 ? 30 : d; }

function saveState() {
  try { localStorage.setItem('psalms_hcsb_state', JSON.stringify(STATE)); } catch(e) {}
  syncToFirebase();
}

const THEMES = {
  'sacred-night':  { label: 'Sacred Night',  swatch: '#0f0e17', type: 'dark' },
  'ocean-depth':   { label: 'Ocean Depth',   swatch: '#0d1b2a', type: 'dark' },
  'royal-ember':   { label: 'Royal Ember',   swatch: '#1c1917', type: 'dark' },
  'parchment':     { label: 'Parchment',     swatch: '#f5f0e8', type: 'light' },
  'soft-stone':    { label: 'Soft Stone',     swatch: '#f2f0ed', type: 'light' },
};

function applyTheme() {
  const s = STATE ? STATE.settings : DEFAULT_PROGRESS.settings;
  let theme;
  if (s.themeMode === 'auto') {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    theme = prefersDark ? s.darkTheme : s.lightTheme;
  } else {
    theme = s.themeMode; // direct theme name
  }
  document.documentElement.setAttribute('data-theme', theme);
  // Update meta theme-color
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta && THEMES[theme]) meta.content = THEMES[theme].swatch;
}

// Listen for system theme changes
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (STATE && STATE.settings.themeMode === 'auto') applyTheme();
});

// ═══════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════
let db = null, userId = null, isGoogleUser = false, authInitialized = false;
function initFirebase() {
  const cfg = { apiKey:"AIzaSyBb3O9D_y8ayQXVx87G-ZjpaMeyD-2sNYY", authDomain:"pantrysense-a87c0.firebaseapp.com", projectId:"pantrysense-a87c0", storageBucket:"pantrysense-a87c0.firebasestorage.app", messagingSenderId:"251646271201", appId:"1:251646271201:web:decd3e1b988e9b8e2121a0" };
  if (!cfg.apiKey) { console.log('No API key'); loadFromLocal(); return; }
  try {
    firebase.initializeApp(cfg);
    db = firebase.firestore();
    // Set persistence explicitly
    firebase.auth().setPersistence(firebase.auth.Auth.Persistence.LOCAL);
    console.log('Firebase initialized, waiting for auth...');
    
    // onAuthStateChanged fires once on init with the persisted user (or null)
    // We use a flag to handle the first call specially
    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        userId = user.uid;
        isGoogleUser = user.providerData.some(p => p.providerId === 'google.com');
        console.log('Auth restored:', userId, isGoogleUser ? '(Google)' : '(Anonymous)');
        authInitialized = true;
        loadFromFirebase();
      } else if (!authInitialized) {
        // First call, no persisted session — sign in anonymously
        authInitialized = true;
        console.log('No persisted session, signing in anonymously...');
        firebase.auth().signInAnonymously().then(c => {
          userId = c.user.uid;
          isGoogleUser = false;
          console.log('Signed in anonymously:', userId);
          loadFromFirebase();
        }).catch(e => { console.error('Auth error:', e); loadFromLocal(); });
      } else {
        // Signed out after being signed in — re-auth anonymously
        console.log('Signed out, re-authenticating...');
        firebase.auth().signInAnonymously().then(c => {
          userId = c.user.uid;
          isGoogleUser = false;
          loadFromFirebase();
        }).catch(e => loadFromLocal());
      }
    });
  } catch(e) { console.error('Firebase init error:', e); loadFromLocal(); }
}

function signInWithGoogle() {
  if (!db) { showToast('Firebase not ready'); return; }
  const provider = new firebase.auth.GoogleAuthProvider();
  const oldUserId = userId;
  const oldState = STATE ? JSON.parse(JSON.stringify(STATE)) : null;
  
  firebase.auth().signInWithPopup(provider).then(result => {
    const newUserId = result.user.uid;
    userId = newUserId;
    isGoogleUser = true;
    console.log('Google sign-in:', newUserId);
    
    // Check if new account has existing data
    db.collection('psalms_users').doc(newUserId).get().then(doc => {
      if (doc.exists && doc.data().psalmProgress) {
        // Existing data found - use it
        STATE = doc.data();
        if (!STATE.todayRecited) STATE.todayRecited = {};
        if (!STATE.currentMemorization) STATE.currentMemorization = DEFAULT_PROGRESS.currentMemorization;
        if (!STATE.settings) STATE.settings = DEFAULT_PROGRESS.settings;
        cleanTodayRecited();
        showToast('Signed in! Existing data loaded.');
      } else if (oldState) {
        // No data for Google account - migrate anonymous data
        STATE = oldState;
        syncToFirebase();
        showToast('Signed in! Data migrated.');
      }
      saveState(); applyTheme(); renderAll();
    });
  }).catch(e => {
    console.error('Google sign-in error:', e);
    showToast('Sign-in failed: ' + e.message);
  });
}

function signOut() {
  firebase.auth().signOut().then(() => {
    isGoogleUser = false;
    userId = null;
    showToast('Signed out');
    // Re-auth anonymously
    firebase.auth().signInAnonymously().then(c => {
      userId = c.user.uid;
      loadFromFirebase();
    });
  });
}
function loadFromFirebase() {
  if (!db || !userId) return loadFromLocal();
  console.log('Loading from Firestore...');
  db.collection('psalms_users').doc(userId).get().then(doc => {
    if (doc.exists) {
      console.log('Found existing data in Firestore');
      STATE = doc.data();
      if (!STATE.todayRecited) STATE.todayRecited = {};
      if (!STATE.currentMemorization) STATE.currentMemorization = DEFAULT_PROGRESS.currentMemorization;
      if (!STATE.settings) STATE.settings = DEFAULT_PROGRESS.settings;
      if (!STATE.psalmProgress) STATE.psalmProgress = DEFAULT_PROGRESS.psalmProgress;
      cleanTodayRecited();
    } else {
      console.log('No Firestore data yet, loading local and pushing to Firebase...');
      // Load from local or defaults, then push to Firebase
      try {
        const s = localStorage.getItem('psalms_hcsb_state');
        if (s) {
          STATE = JSON.parse(s);
          if (!STATE.todayRecited) STATE.todayRecited = {};
          if (!STATE.currentMemorization) STATE.currentMemorization = DEFAULT_PROGRESS.currentMemorization;
          if (!STATE.settings) STATE.settings = DEFAULT_PROGRESS.settings;
          cleanTodayRecited();
        } else {
          STATE = JSON.parse(JSON.stringify(DEFAULT_PROGRESS));
        }
      } catch(e) { STATE = JSON.parse(JSON.stringify(DEFAULT_PROGRESS)); }
      // Push initial data to Firebase
      syncToFirebase();
    }
    applyTheme(); hideLoading(); renderAll();
  }).catch(e => { console.error('Firestore load error:', e); loadFromLocal(); });
}
function syncToFirebase() {
  if (!db || !userId || !STATE) { console.log('Sync skipped - not ready'); return; }
  console.log('Syncing to Firestore...');
  db.collection('psalms_users').doc(userId).set(STATE).then(() => {
    console.log('Synced successfully');
  }).catch(e => { console.error('Sync error:', e); });
}
function loadFromLocal() {
  try {
    const s = localStorage.getItem('psalms_hcsb_state');
    if (s) {
      STATE = JSON.parse(s);
      if (!STATE.todayRecited) STATE.todayRecited = {};
      if (!STATE.currentMemorization) STATE.currentMemorization = DEFAULT_PROGRESS.currentMemorization;
      if (!STATE.settings) STATE.settings = DEFAULT_PROGRESS.settings;
      cleanTodayRecited();
    } else {
      STATE = JSON.parse(JSON.stringify(DEFAULT_PROGRESS));
    }
  } catch(e) { STATE = JSON.parse(JSON.stringify(DEFAULT_PROGRESS)); }
  applyTheme(); hideLoading(); renderAll();
}
function cleanTodayRecited() {
  const t = getToday();
  if (STATE.todayRecited._date !== t) STATE.todayRecited = { _date: t };
}
function hideLoading() { document.getElementById('loadingOverlay').classList.add('hidden'); }

// ═══════════════════════════════════════════
// PSALMS DUE TODAY
// ═══════════════════════════════════════════
function getPsalmsDueToday() {
  const today = getToday(), dom = getDayOfMonth(), due = [];
  const cm = STATE.currentMemorization;
  if (cm && cm.psalm && cm.lastMemorizedVerse > 0) {
    due.push({ psalmNum: cm.psalm, type: 'current', label: `Psalm ${cm.psalm}:1-${cm.lastMemorizedVerse}`, meta: 'Currently memorizing' });
  }
  for (const [pNum, prog] of Object.entries(STATE.psalmProgress)) {
    const num = parseInt(pNum);
    // Skip the current memorization psalm if it appears in progress
    if (cm && cm.psalm === num) continue;
    if (prog.status === 'graduated') {
      if (prog.nextDue <= today || STATE.todayRecited[num]) {
        due.push({ psalmNum: num, type: prog.nextDue <= today && !STATE.todayRecited[num] ? (prog.nextDue < today ? 'overdue' : 'graduated') : 'graduated', label: `Psalm ${num}`, dayGap: prog.dayGap, overdue: prog.nextDue < today && !STATE.todayRecited[num] });
      }
    } else if (prog.status === 'solidifying') {
      if (prog.nextDue <= today || STATE.todayRecited[num]) {
        due.push({ psalmNum: num, type: 'solidifying', label: `Psalm ${num}`, solidifyDay: prog.solidifyDay||0 });
      }
    } else if (prog.status === 'complete') {
      if (psalmDayOfMonth(num) === dom || (prog.nextDue && prog.nextDue <= today) || STATE.todayRecited[num]) {
        const isOverdue = prog.nextDue && prog.nextDue < today && !STATE.todayRecited[num];
        due.push({ psalmNum: num, type: isOverdue ? 'overdue' : 'monthly', label: `Psalm ${num}`, firstCompleted: prog.firstCompleted, overdue: isOverdue });
      }
    }
  }
  const order = { current:0, solidifying:1, overdue:2, graduated:3, monthly:4 };
  due.sort((a,b) => {
    const oa = order[a.type] !== undefined ? order[a.type] : 9;
    const ob = order[b.type] !== undefined ? order[b.type] : 9;
    return oa - ob || a.psalmNum - b.psalmNum;
  });
  return due;
}

// ═══════════════════════════════════════════
// RENDER: RECITATION
// ═══════════════════════════════════════════
function renderRecitation() {
  const d = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const mos = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('todayDate').textContent = `${days[d.getDay()]}, ${mos[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()}`;
  const due = getPsalmsDueToday();
  const ct = document.getElementById('recitationList');
  const done = due.filter(p => STATE.todayRecited[p.psalmNum]).length;
  document.getElementById('reciteBadge').textContent = due.length - done;
  if (!due.length) { ct.innerHTML = '<div class="empty-state">No psalms due for recitation today.</div>'; return; }
  let html = '', lt = null;
  for (const item of due) {
    const isDone = STATE.todayRecited[item.psalmNum];
    if (item.type !== lt) {
      const labels = { current:'Current Memorization', solidifying:'Solidifying (Daily)', overdue:'Overdue', graduated:'Graduated Recitation', monthly:'Monthly Recitation' };
      html += `<div class="section-label">${labels[item.type]||''}</div>`;
      lt = item.type;
    }
    const cls = isDone ? 'done' : (item.type==='overdue' ? 'overdue' : 'due');
    // Compute next due date for display when done
    let nextDueStr = '';
    if (isDone) {
      const prog = STATE.psalmProgress[item.psalmNum];
      if (prog && prog.nextDue) nextDueStr = `Next: ${formatDateShort(prog.nextDue)}`;
      else if (item.type==='current') nextDueStr = 'Daily';
    }
    html += `<div class="recite-card ${cls}" data-psalm="${item.psalmNum}" data-type="${item.type}">
      <div class="psalm-num">${item.psalmNum}</div>
      <div class="psalm-info">
        <div class="psalm-title">${item.label}</div>
        <div class="psalm-meta">
          ${isDone ? `<span style="color:var(--green)">✓ Done</span>${nextDueStr ? ` · <span style="color:var(--text-dim)">${nextDueStr}</span>` : ''}` : `${item.type==='graduated'||item.type==='overdue' ? `<span class="gap-badge">${item.dayGap} days</span>` : ''}${item.type==='solidifying' ? `<span class="gap-badge">Day ${(item.solidifyDay||0)+1} of 7</span>` : ''}${item.type==='monthly'&&item.firstCompleted ? `<span class="complete-date">Since ${formatDateShort(item.firstCompleted)}</span>` : ''}${item.type==='current' ? '<span style="color:var(--blue)">Recite what you\'ve memorized</span>' : ''}${item.overdue ? ' <span style="color:var(--red)">overdue</span>' : ''}`}
        </div>
      </div>
      <div class="check-area"></div>
    </div>`;
  }
  ct.innerHTML = html;
  ct.querySelectorAll('.recite-card').forEach(c => c.addEventListener('click', () => openReciteDetail(parseInt(c.dataset.psalm), c.dataset.type)));
}

// ═══════════════════════════════════════════
// RECITE DETAIL
// ═══════════════════════════════════════════
let curMode = 'versetap', curPsalm = null, curType = null, flState = null;

function openReciteDetail(pn, type) {
  curPsalm = pn; curType = type; curMode = 'versetap';
  document.getElementById('reciteDetail').classList.add('active');
  const prog = STATE.psalmProgress[pn], cm = STATE.currentMemorization;
  let title = `Psalm ${pn}`;
  if (type==='current') title = `Psalm ${pn}:1-${cm.lastMemorizedVerse}`;
  document.getElementById('reciteDetailTitle').textContent = title;
  const g = document.getElementById('reciteDetailGap');
  if (prog && prog.status==='graduated') { g.textContent = `${prog.dayGap} day gap`; g.style.display=''; }
  else if (prog && prog.status==='complete') { g.textContent = 'Monthly'; g.style.display=''; }
  else if (prog && prog.status==='solidifying') { g.textContent = `Day ${prog.solidifyDay||0}/7`; g.style.display=''; }
  else if (type==='current') { g.textContent = 'Daily'; g.style.display=''; }
  else { g.style.display='none'; }
  renderReciteBody(false);
}

function getVersesForRecite() {
  const pd = PSALMS_DATA[curPsalm]; if(!pd) return [];
  const cm = STATE.currentMemorization;
  let vv = [];
  for (const b of pd.blocks) for (const v of b.verses) {
    if (curType==='current') { if (v.num <= cm.lastMemorizedVerse) vv.push(v); }
    else vv.push(v);
  }
  return vv;
}

function renderReciteBody(showText) {
  const vv = getVersesForRecite();
  const isDone = STATE.todayRecited[curPsalm];
  const body = document.getElementById('reciteDetailBody');
  const acts = document.getElementById('reciteDetailActions');
  if (isDone) {
    // Show completed state with tappable words for review and undo option
    let whtml = '';
    for (const v of vv) {
      const words = v.text.split(/\s+/).filter(w=>w);
      whtml += `<span class="verse-num">${v.num}</span>`;
      for (const w of words) whtml += `<span class="verse-text">${w} </span>`;
    }
    body.innerHTML = `<div style="text-align:center;padding:20px 0"><div style="font-size:48px;margin-bottom:8px">✓</div><div style="font-family:var(--font-display);font-size:22px;color:var(--green)">Completed today</div></div><div class="verse-display">${whtml}</div>`;
    acts.innerHTML = `<button class="action-btn btn-secondary" onclick="undoRecitation()">Undo — I Need to Redo This</button><button class="action-btn btn-secondary" onclick="closeReciteDetail()" style="margin-top:4px">Back</button>`;
    return;
  }
  let html = `<div class="recite-mode-picker"><button class="mode-btn ${curMode==='versetap'?'active':''}" onclick="switchMode('versetap')">Verse Tap</button><button class="mode-btn ${curMode==='car'?'active':''}" onclick="switchMode('car')">Car Mode</button><button class="mode-btn ${curMode==='self'?'active':''}" onclick="switchMode('self')">Self</button></div>`;
  if (curMode==='self') {
    // Self mode: reveals whole passage with tappable words for marking wrong
    html += renderSelfMode(vv);
    acts.innerHTML = '';
  } else if (curMode==='versetap') {
    html += renderVerseTapMode(vv);
    acts.innerHTML = '';
  } else if (curMode==='car') {
    html += renderCarMode(vv);
    acts.innerHTML = '';
  }
  body.innerHTML = html;
  body.scrollTop = 0;
  if (curMode==='versetap') initVerseTapMode(vv);
  if (curMode==='car') initCarMode(vv);
  if (curMode==='self') initSelfMode(vv);
}

function switchMode(m) {
  document.body.style.overflow = '';
  document.getElementById('reciteDetailBody').style.overflow = '';
  document.getElementById('reciteDetailActions').style.display = '';
  curMode = m;
  renderReciteBody(false);
}

function handlePass() {
  const pn = curPsalm, type = curType;
  STATE.todayRecited[pn] = true;
  let historyEntry = { date: getToday(), psalm: pn, result: 'pass' };
  if ((type==='graduated'||type==='overdue') && STATE.psalmProgress[pn] && STATE.psalmProgress[pn].status !== 'complete') {
    const p = STATE.psalmProgress[pn];
    const oldGap = p.dayGap;
    if (p.dayGap >= 30) {
      p.status = 'complete'; p.dayGap = 30; p.firstCompleted = getToday();
      const dom = psalmDayOfMonth(pn), now = new Date();
      let nd = new Date(now.getFullYear(), now.getMonth()+1, dom);
      if(nd.getMonth()===1&&dom>28) nd = new Date(nd.getFullYear(),1,28);
      p.nextDue = nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0')+'-'+String(nd.getDate()).padStart(2,'0');
      historyEntry.detail = `${oldGap}d → Permanent!`;
      showToast(`Psalm ${pn} is now permanent! 🎉`);
    } else {
      p.dayGap += 1;
      const nd = new Date(); nd.setDate(nd.getDate()+p.dayGap);
      p.nextDue = nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0')+'-'+String(nd.getDate()).padStart(2,'0');
      historyEntry.detail = `${oldGap}d → ${p.dayGap}d`;
      showToast(`Psalm ${pn} — next in ${p.dayGap} days`);
    }
  } else if (type==='solidifying') {
    const p = STATE.psalmProgress[pn];
    p.solidifyDay = (p.solidifyDay||0) + 1;
    const tm = new Date(); tm.setDate(tm.getDate()+1);
    p.nextDue = tm.getFullYear()+'-'+String(tm.getMonth()+1).padStart(2,'0')+'-'+String(tm.getDate()).padStart(2,'0');
    if (p.solidifyDay >= 7) {
      p.status = 'graduated'; p.dayGap = 1; delete p.solidifyDay;
      historyEntry.detail = 'Solidified → Graduated!';
      showToast(`Psalm ${pn} solidified! Now in graduated recitation.`);
    } else {
      historyEntry.detail = `Solidify day ${p.solidifyDay}/7`;
      showToast(`Psalm ${pn} — day ${p.solidifyDay} of 7`);
    }
  } else if (type==='monthly' || (type==='overdue' && STATE.psalmProgress[pn] && STATE.psalmProgress[pn].status === 'complete')) {
    const p = STATE.psalmProgress[pn], dom = psalmDayOfMonth(pn), now = new Date();
    let nd = new Date(now.getFullYear(), now.getMonth()+1, dom);
    if(nd.getMonth()===1&&dom>28) nd = new Date(nd.getFullYear(),1,28);
    p.nextDue = nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0')+'-'+String(nd.getDate()).padStart(2,'0');
    historyEntry.detail = 'Monthly';
    showToast(`Psalm ${pn} — recited ✓`);
  } else {
    historyEntry.detail = 'Daily';
    showToast('Daily recitation — done ✓');
  }
  // Add to history
  if (!STATE.recitationHistory) STATE.recitationHistory = [];
  STATE.recitationHistory.push(historyEntry);
  // Keep last 200 entries
  if (STATE.recitationHistory.length > 200) STATE.recitationHistory = STATE.recitationHistory.slice(-200);
  saveState(); renderReciteBody(false); renderRecitation();
}

function handleFail() { renderReciteBody(true); }

function handlePracticed() {
  const pn = curPsalm, type = curType;
  STATE.todayRecited[pn] = true;
  let historyEntry = { date: getToday(), psalm: pn, result: 'fail' };
  if ((type==='graduated'||type==='overdue'||type==='solidifying') && STATE.psalmProgress[pn] && STATE.psalmProgress[pn].status !== 'complete') {
    const p = STATE.psalmProgress[pn];
    const tm = new Date(); tm.setDate(tm.getDate()+1);
    p.nextDue = tm.getFullYear()+'-'+String(tm.getMonth()+1).padStart(2,'0')+'-'+String(tm.getDate()).padStart(2,'0');
    if (type==='solidifying') {
      // Reset solidify counter on fail
      p.solidifyDay = 0;
      historyEntry.detail = `Solidify reset — retry tomorrow`;
      showToast(`Psalm ${pn} — solidification restarted`);
    } else {
      historyEntry.detail = `Stays at ${p.dayGap}d — retry tomorrow`;
      showToast(`Psalm ${pn} — try again tomorrow (${p.dayGap} days)`);
    }
  } else {
    historyEntry.detail = 'Practiced';
    showToast(`Psalm ${pn} — practiced ✓`);
  }
  if (!STATE.recitationHistory) STATE.recitationHistory = [];
  STATE.recitationHistory.push(historyEntry);
  if (STATE.recitationHistory.length > 200) STATE.recitationHistory = STATE.recitationHistory.slice(-200);
  saveState(); renderReciteBody(false); renderRecitation();
}

function closeReciteDetail() {
  document.getElementById('reciteDetail').classList.remove('active');
  document.getElementById('reciteDetailBody').style.overflow = '';
  document.getElementById('reciteDetailActions').style.display = '';
  document.body.style.overflow = '';
  curPsalm = null;
}

function initSelfMode(vv) {

function toggleSelfWrong(el) {
  if (el.classList.contains('self-wrong')) {
    el.classList.remove('self-wrong');
    el.style.color = 'var(--text-primary)';
    el.style.textDecoration = 'none';
    selfWrongWords--;
  } else {
    el.classList.add('self-wrong');

    el.style.textDecoration = 'underline';
    selfWrongWords++;

  const wc = document.getElementById('selfWrongCount');
  if (wc) wc.textContent = selfWrongWords > 0 ? `${selfWrongWords} word${selfWrongWords>1?'s':''} missed` : '';
}

// ═══════════════════════════════════════════
// CAR / RUNNING MODE
// ═══════════════════════════════════════════
let carState = null;

function renderCarMode(verses) {
  let h = '<div id="carModeArea" style="display:flex;flex-direction:column;height:100%;overflow:hidden;margin:-18px;padding:12px;padding-bottom:36px">';
  // Top half: verse display
  h += '<div id="carVerseDisplay" style="flex:1;display:flex;align-items:center;justify-content:center;padding:8px 12px;text-align:center;overflow:hidden"><div style="font-family:var(--font-display);font-size:18px;color:var(--text-dim);font-style:italic">Tap below to reveal the first verse</div></div>';
  // Bottom half: giant button + practice
  h += '<div style="flex:1;display:flex;flex-direction:column;gap:6px">';
  h += '<div class="fl-progress" id="carProgress" style="text-align:center;flex-shrink:0"></div>';
  h += '<button id="carTapBtn" style="flex:1;width:100%;background:var(--accent);color:var(--bg-deep);border:none;border-radius:var(--radius);font-family:var(--font-body);font-size:24px;font-weight:700;cursor:pointer" onclick="handleCarTap()">Tap to Reveal Verse</button>';
