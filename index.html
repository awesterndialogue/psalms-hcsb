<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1c1917">
<title>Psalms</title>
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-title" content="Psalms">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Sans+3:wght@300;400;500;600&family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@400;500;600;700&family=Nunito:wght@400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════ */
/* THEME VARIABLES                            */
/* ═══════════════════════════════════════════ */

/* Default: Royal Ember (dark) */
:root {
  --bg-deep: #1c1917;
  --bg-card: #292420;
  --bg-card-hover: #342e28;
  --bg-surface: #232019;
  --accent: #d97a3e;
  --accent-dim: #a05a28;
  --accent-glow: rgba(217,122,62,0.12);
  --text-primary: #e8ddd0;
  --text-secondary: #a09080;
  --text-dim: #5c5248;
  --green: #5ca06e;
  --green-dim: #3a6b44;
  --red: #c4594a;
  --red-dim: #8b3a30;
  --blue: #5a8ec4;
  --blue-dim: #3a5f8b;
  --font-display: 'Libre Baskerville', Georgia, serif;
  --font-body: 'Outfit', -apple-system, sans-serif;
  --font-display-size: 24px;
  --font-verse-size: 22px;
  --font-body-size: 15px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --radius: 12px;
  --radius-sm: 8px;
  --border-subtle: rgba(217,122,62,0.1);
}

/* Sacred Night */
[data-theme="sacred-night"] {
  --bg-deep: #0f0e17;
  --bg-card: #1a1a2e;
  --bg-card-hover: #222244;
  --bg-surface: #16213e;
  --accent: #d4a843;
  --accent-dim: #a07830;
  --accent-glow: rgba(212,168,67,0.12);
  --text-primary: #e8e4dc;
  --text-secondary: #9a9486;
  --text-dim: #5c5850;
  --border-subtle: rgba(212,168,67,0.1);
  --font-display: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Source Sans 3', -apple-system, sans-serif;
}

/* Ocean Depth */
[data-theme="ocean-depth"] {
  --bg-deep: #0d1b2a;
  --bg-card: #1b2d3d;
  --bg-card-hover: #243848;
  --bg-surface: #152535;
  --accent: #7ec8c8;
  --accent-dim: #4a8a8a;
  --accent-glow: rgba(126,200,200,0.1);
  --text-primary: #d0dfe0;
  --text-secondary: #7a9a9a;
  --text-dim: #3e5858;
  --border-subtle: rgba(126,200,200,0.1);
  --font-display: 'Crimson Pro', Georgia, serif;
  --font-body: 'Outfit', -apple-system, sans-serif;
}

/* Parchment */
[data-theme="parchment"] {
  --bg-deep: #f5f0e8;
  --bg-card: #ece5d8;
  --bg-card-hover: #e2dace;
  --bg-surface: #e8e0d0;
  --accent: #6b4226;
  --accent-dim: #8b5e3c;
  --accent-glow: rgba(107,66,38,0.08);
  --text-primary: #3d2510;
  --text-secondary: #7a6650;
  --text-dim: #b0a090;
  --green: #3a6b4c;
  --green-dim: #2d5a3d;
  --red: #a04030;
  --red-dim: #7a3028;
  --blue: #3a5f8b;
  --blue-dim: #2d4a6b;
  --border-subtle: rgba(107,66,38,0.12);
  --font-display: 'EB Garamond', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;
}

/* Soft Stone */
[data-theme="soft-stone"] {
  --bg-deep: #f2f0ed;
  --bg-card: #e8e5e0;
  --bg-card-hover: #dddad5;
  --bg-surface: #e0ddd8;
  --accent: #3a6b4c;
  --accent-dim: #4a8060;
  --accent-glow: rgba(58,107,76,0.08);
  --text-primary: #2c2c2c;
  --text-secondary: #6a6660;
  --text-dim: #aaa8a4;
  --green: #3a6b4c;
  --green-dim: #2d5a3d;
  --red: #a04030;
  --red-dim: #7a3028;
  --blue: #3a5f8b;
  --blue-dim: #2d4a6b;
  --border-subtle: rgba(58,107,76,0.1);
  --font-display: 'Lora', Georgia, serif;
  --font-body: 'Nunito', -apple-system, sans-serif;
}

/* ═══════════════════════════════════════════ */
/* BASE STYLES                                */
/* ═══════════════════════════════════════════ */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: var(--font-body-size);
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  transition: background 0.3s, color 0.3s;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100%;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}

/* ── Header ── */
.app-header {
  padding: 14px 16px 8px;
  text-align: center;
  flex-shrink: 0;
  background: var(--bg-deep);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.app-header h1 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: 1px;
}
.app-header .settings-btn {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 22px;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
}

/* ── Tab Navigation ── */
.tab-nav {
  display: flex;
  flex-shrink: 0;
  background: var(--bg-deep);
  border-bottom: 1px solid var(--border-subtle);
  padding: 0 8px;
}
.tab-btn {
  flex: 1;
  padding: 10px 4px 8px;
  background: none;
  border: none;
  color: var(--text-dim);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  letter-spacing: 0.3px;
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
}
.tab-btn.active { color: var(--accent); }
.tab-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--accent);
  border-radius: 2px;
}
.tab-btn .tab-badge {
  display: inline-block;
  background: var(--accent);
  color: var(--bg-deep);
  font-size: 10px;
  font-weight: 700;
  min-width: 18px; height: 18px; line-height: 18px;
  border-radius: 9px;
  text-align: center;
  margin-left: 4px;
  padding: 0 5px;
}

/* ── Screens ── */
.screen {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  display: none;
  padding: 14px 14px 90px;
}
.screen.active { display: block; }

/* ── Recitation Cards ── */
.today-date {
  text-align: center;
  font-family: var(--font-display);
  font-size: 17px;
  color: var(--text-secondary);
  margin-bottom: 18px;
  font-style: italic;
}
.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent-dim);
  margin: 22px 0 10px 4px;
}
.section-label:first-child { margin-top: 4px; }

.recite-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px 18px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 14px;
  cursor: pointer;
  transition: background 0.15s;
  border: 1px solid transparent;
}
.recite-card:active { background: var(--bg-card-hover); }
.recite-card.due { border-left: 3px solid var(--accent); }
.recite-card.overdue { border-left: 3px solid var(--red); }
.recite-card.done { border-left: 3px solid var(--green); opacity: 0.55; }

.recite-card .psalm-num {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 700;
  color: var(--accent);
  min-width: 50px;
  text-align: center;
  line-height: 1;
}
.recite-card .psalm-info { flex: 1; min-width: 0; }
.recite-card .psalm-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
}
.recite-card .psalm-meta {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 3px;
}
.recite-card .psalm-meta .gap-badge {
  display: inline-block;
  background: var(--bg-surface);
  padding: 2px 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 500;
  color: var(--accent);
}
.recite-card .psalm-meta .complete-date { color: var(--green); font-style: italic; }
.recite-card .check-area {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 2px solid var(--text-dim);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: all 0.2s;
}
.recite-card.done .check-area { background: var(--green); border-color: var(--green); }
.recite-card.done .check-area::after { content: '✓'; color: white; font-size: 18px; font-weight: 700; }

/* ── Recitation Detail ── */
.recite-detail {
  position: fixed; inset: 0;
  background: var(--bg-deep);
  z-index: 100;
  display: none;
  flex-direction: column;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bottom);
}
.recite-detail.active { display: flex; }
.recite-detail-header {
  padding: 14px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 1px solid var(--border-subtle);
  flex-shrink: 0;
}
.back-btn {
  background: none; border: none;
  color: var(--accent);
  font-size: 28px;
  cursor: pointer;
  padding: 4px 8px;
  line-height: 1;
}
.recite-detail-header h2 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--text-primary);
}
.recite-detail-header .detail-gap {
  margin-left: auto;
  font-size: 13px;
  color: var(--accent);
  background: var(--bg-surface);
  padding: 4px 12px;
  border-radius: 12px;
}
.recite-detail-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 18px;
}
.recite-mode-picker {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
}
.mode-btn {
  flex: 1;
  padding: 12px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--text-dim);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-family: var(--font-body);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.mode-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
}

/* Verse display */
.verse-display {
  font-family: var(--font-display);
  font-size: var(--font-verse-size);
  line-height: 1.8;
  color: var(--text-primary);
  margin-bottom: 24px;
}
.verse-display .verse-num {
  font-weight: 700;
  color: var(--accent);
  font-size: 15px;
  vertical-align: super;
  margin-right: 2px;
}

/* First letter mode */
.first-letter-area { margin-bottom: 24px; display: flex; flex-direction: column; }
.fl-top-bar {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--bg-deep);
  padding: 12px 0 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid var(--border-subtle);
  margin-bottom: 14px;
}
.fl-words {
  display: flex;
  flex-wrap: wrap;
  gap: 5px 7px;
  font-family: var(--font-display);
  font-size: 19px;
  line-height: 1.9;
  padding-bottom: 20px;
}
.fl-word {
  color: var(--text-dim);
  transition: color 0.2s;
  padding: 1px 2px;
}
.fl-word.revealed { color: var(--text-primary); }
.fl-word.current { color: var(--accent); border-bottom: 2px solid var(--accent); }
.fl-word.verse-num-word { color: var(--accent); font-weight: 700; font-size: 14px; vertical-align: super; }
.fl-word.verse-num-word.revealed { color: var(--accent); }
.fl-word.auto-revealed { color: var(--red); }

.fl-input-area {
  display: flex;
  align-items: center;
  gap: 12px;
  justify-content: center;
}
.fl-input {
  width: 68px; height: 68px;
  font-size: 32px;
  font-family: var(--font-display);
  font-weight: 700;
  text-align: center;
  text-transform: lowercase;
  background: var(--bg-card);
  border: 2px solid var(--text-dim);
  border-radius: var(--radius);
  color: var(--text-primary);
  outline: none;
  caret-color: var(--accent);
}
.fl-input:focus { border-color: var(--accent); }
.fl-input.correct { border-color: var(--green); background: rgba(90,160,110,0.1); }
.fl-input.wrong { border-color: var(--red); background: rgba(196,89,74,0.1); animation: shake 0.3s; }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

.fl-progress {
  font-size: 13px;
  color: var(--text-secondary);
}
.fl-strikes {
  font-size: 12px;
  color: var(--red);
  min-height: 18px;
}

/* Action buttons */
.recite-actions {
  padding: 16px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.action-btn {
  width: 100%;
  padding: 18px;
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.action-btn:active { transform: scale(0.98); }
.btn-pass { background: var(--green); color: white; }
.btn-fail { background: var(--bg-card); color: var(--red); border: 1px solid var(--red-dim); }
.btn-practiced { background: var(--accent); color: var(--bg-deep); }
.btn-secondary { background: var(--bg-card); color: var(--text-secondary); border: 1px solid var(--text-dim); }

/* ── Memorization Screen ── */
.mem-status {
  text-align: center;
  padding: 14px;
  background: var(--bg-card);
  border-radius: var(--radius);
  margin-bottom: 18px;
}
.mem-status .current-psalm {
  font-family: var(--font-display);
  font-size: var(--font-display-size);
  font-weight: 700;
  color: var(--accent);
}
.mem-status .current-progress {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 4px;
}
.mem-progress-bar {
  height: 4px;
  background: var(--bg-surface);
  border-radius: 2px;
  margin-top: 10px;
  overflow: hidden;
}
.mem-progress-bar .fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

.step-header { text-align: center; margin-bottom: 18px; }
.step-header .step-num {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.step-header .step-instruction {
  font-size: 15px;
  color: var(--text-secondary);
  margin-top: 6px;
  line-height: 1.5;
}

.verse-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 14px;
}
.verse-card.hidden-card {
  background: var(--bg-surface);
  border: 1px dashed var(--text-dim);
  text-align: center;
  padding: 36px 20px;
  color: var(--text-secondary);
  font-style: italic;
  font-family: var(--font-display);
  font-size: 18px;
}

.step-btn {
  display: block;
  width: 100%;
  max-width: 400px;
  margin: 28px auto 0;
  padding: 20px;
  background: var(--accent);
  color: var(--bg-deep);
  border: none;
  border-radius: var(--radius);
  font-family: var(--font-body);
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.step-btn:active { transform: scale(0.97); opacity: 0.9; }

/* ── Progress Screen ── */
.progress-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(64px, 1fr));
  gap: 6px;
  margin-bottom: 20px;
}
.psalm-chip {
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 10px 4px;
  text-align: center;
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 18px;
  color: var(--text-dim);
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
}
.psalm-chip:active { transform: scale(0.95); }
.psalm-chip.complete { color: var(--green); border-color: var(--green-dim); background: rgba(90,160,110,0.06); }
.psalm-chip.graduated { color: var(--accent); border-color: var(--accent-dim); background: var(--accent-glow); }
.psalm-chip.memorizing { color: var(--blue); border-color: var(--blue-dim); background: rgba(90,142,196,0.06); }
.psalm-chip .chip-sub {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 400;
  margin-top: 2px;
  display: block;
}

.legend { display: flex; gap: 16px; justify-content: center; margin-bottom: 16px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

.stats-row { display: flex; gap: 8px; margin-bottom: 16px; }
.stat-box {
  flex: 1;
  background: var(--bg-card);
  border-radius: var(--radius-sm);
  padding: 14px 8px;
  text-align: center;
}
.stat-box .stat-val { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-box .stat-label { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

/* ── Settings Screen ── */
.settings-group {
  background: var(--bg-card);
  border-radius: var(--radius);
  margin-bottom: 14px;
  overflow: hidden;
}
.settings-group-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--accent-dim);
  margin: 20px 0 8px 4px;
}
.settings-group-title:first-child { margin-top: 4px; }
.setting-row {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border-subtle);
}
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 15px; color: var(--text-primary); }
.setting-value { font-size: 14px; color: var(--accent); }

.theme-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 14px 18px;
}
.theme-option {
  padding: 12px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--text-dim);
  cursor: pointer;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  transition: all 0.15s;
}
.theme-option.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
.theme-swatch {
  width: 28px; height: 28px;
  border-radius: 50%;
  margin: 0 auto 6px;
  border: 2px solid rgba(255,255,255,0.1);
}
.toggle-row {
  display: flex;
  gap: 6px;
  padding: 4px 18px 14px;
}
.toggle-btn {
  flex: 1;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--text-dim);
  background: var(--bg-surface);
  color: var(--text-secondary);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
}
.toggle-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

/* ── Misc ── */
.empty-state {
  text-align: center; padding: 48px 20px;
  color: var(--text-dim);
  font-family: var(--font-display);
  font-size: 18px;
  font-style: italic;
}
.toast {
  position: fixed;
  bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--green);
  color: white;
  padding: 12px 22px;
  border-radius: 22px;
  font-size: 15px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s;
  z-index: 200;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.screen::-webkit-scrollbar { width: 4px; }
.screen::-webkit-scrollbar-track { background: transparent; }
.screen::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 2px; }

.loading-overlay {
  position: fixed; inset: 0;
  background: var(--bg-deep);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 999;
  transition: opacity 0.4s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-overlay h2 { font-family: var(--font-display); font-size: 30px; color: var(--accent); margin-bottom: 8px; }
.loading-overlay p { font-size: 13px; color: var(--text-dim); letter-spacing: 2px; text-transform: uppercase; }
.loading-spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--text-dim);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-top: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <h2>Psalms</h2>
  <p>Holman Christian Standard Bible</p>
  <div class="loading-spinner"></div>
</div>

<div id="app">
  <header class="app-header">
    <button class="settings-btn" onclick="refreshApp()" title="Refresh" style="position:absolute;left:14px;right:auto">↻</button>
    <h1>Psalms</h1>
    <button class="settings-btn" onclick="showScreen('settings')" title="Settings">⚙</button>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="recitation">Recitation <span class="tab-badge" id="reciteBadge">0</span></button>
    <button class="tab-btn" data-tab="memorize">Memorize</button>
    <button class="tab-btn" data-tab="progress">Progress</button>
  </nav>

  <div class="screen active" id="screen-recitation">
    <div class="today-date" id="todayDate"></div>
    <div id="recitationList"></div>
  </div>

  <div class="screen" id="screen-memorize"><div id="memorizeContent"></div></div>
  <div class="screen" id="screen-progress"><div id="progressContent"></div></div>
  <div class="screen" id="screen-settings"><div id="settingsContent"></div></div>
</div>

<div class="recite-detail" id="reciteDetail">
  <div class="recite-detail-header">
    <button class="back-btn" id="reciteBack">‹</button>
    <h2 id="reciteDetailTitle"></h2>
    <span class="detail-gap" id="reciteDetailGap"></span>
  </div>
  <div class="recite-detail-body" id="reciteDetailBody"></div>
  <div class="recite-actions" id="reciteDetailActions"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════
// PSALMS DATA
// ═══════════════════════════════════════════
const PSALMS_DATA = {"1":{"blocks":[{"header":"Psalm 1:1\u20133 (HCSB)","startVerse":1,"endVerse":3,"verses":[{"num":1,"text":"How happy is the man who does not follow the advice of the wicked or take the path of sinners or join a group of mockers!"},{"num":2,"text":"Instead, his delight is in Yahweh\u2019s instruction, and he meditates on it day and night."},{"num":3,"text":"He is like a tree planted beside streams of water that bears its fruit in season and whose leaf does not wither. Whatever he does prospers."}]},{"header":"Psalm 1:4\u20136 (HCSB)","startVerse":4,"endVerse":6,"verses":[{"num":4,"text":"The wicked are not like this; instead, they are like chaff that the wind blows away."},{"num":5,"text":"Therefore the wicked will not survive the judgment, and sinners will not be in the community of the righteous."},{"num":6,"text":"For Yahweh watches over the way of the righteous, but the way of the wicked leads to ruin."}]}]},"2":{"blocks":[{"header":"Psalm 2:1\u20136 (HCSB)","startVerse":1,"endVerse":6,"verses":[{"num":1,"text":"Why do the nations rebel and the peoples plot in vain?"},{"num":2,"text":"The kings of the earth take their stand, and the rulers conspire together against Yahweh and His Anointed One:"},{"num":3,"text":"\u201cLet us tear off their chains and free ourselves from their restraints.\u201d"},{"num":4,"text":"The One enthroned in heaven laughs; the Lord ridicules them."},{"num":5,"text":"Then He speaks to them in His anger and terrifies them in His wrath:"},{"num":6,"text":"\u201cI have consecrated My King on Zion, My holy mountain.\u201d"}]},{"header":"Psalm 2:7\u201312 (HCSB)","startVerse":7,"endVerse":12,"verses":[{"num":7,"text":"I will declare Yahweh\u2019s decree: He said to Me, \u201cYou are My Son; today I have become Your Father."},{"num":8,"text":"Ask of Me, and I will make the nations Your inheritance and the ends of the earth Your possession."},{"num":9,"text":"You will break them with a rod of iron; You will shatter them like pottery.\u201d"},{"num":10,"text":"So now, kings, be wise; receive instruction, you judges of the earth."},{"num":11,"text":"Serve Yahweh with reverential awe and rejoice with trembling."},{"num":12,"text":"Pay homage to the Son or He will be angry and you will perish in your rebellion, for His anger may ignite at any moment. All those who take refuge in Him are happy."}]}]},"4":{"blocks":[{"header":"Psalm 4:1\u20135 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"Answer me when I call, God, who vindicates me. You freed me from affliction; be gracious to me and hear my prayer."},{"num":2,"text":"How long, exalted men, will my honor be insulted? How long will you love what is worthless and pursue a lie? Selah"},{"num":3,"text":"Know that Yahweh has set apart the faithful for Himself; Yahweh will hear when I call to Him."},{"num":4,"text":"Be angry and do not sin; on your bed, reflect in your heart and be still. Selah"},{"num":5,"text":"Offer sacrifices in righteousness and trust in Yahweh."}]},{"header":"Psalm 4:6\u20138 (HCSB)","startVerse":6,"endVerse":8,"verses":[{"num":6,"text":"Many are saying, \u201cWho can show us anything good?\u201d Look on us with favor, Yahweh."},{"num":7,"text":"You have put more joy in my heart than they have when their grain and new wine abound."},{"num":8,"text":"I will both lie down and sleep in peace, for You alone, Yahweh, make me live in safety."}]}]},"3":{"blocks":[{"header":"Psalm 3:1\u20134 (HCSB)","startVerse":1,"endVerse":4,"verses":[{"num":1,"text":"Yahweh, how my foes increase! There are many who attack me."},{"num":2,"text":"Many say about me, \u201cThere is no help for him in God.\u201d Selah"},{"num":3,"text":"But You, Yahweh, are a shield around me, my glory, and the One who lifts up my head."},{"num":4,"text":"I cry aloud to Yahweh, and He answers me from His holy mountain. Selah"}]},{"header":"Psalm 3:5\u20138 (HCSB)","startVerse":5,"endVerse":8,"verses":[{"num":5,"text":"I lie down and sleep; I wake again because Yahweh sustains me."},{"num":6,"text":"I am not afraid of the thousands of people who have taken their stand against me on every side."},{"num":7,"text":"Rise up, Yahweh! Save me, my God! You strike all my enemies on the cheek; You break the teeth of the wicked."},{"num":8,"text":"Salvation belongs to Yahweh; may Your blessing be on Your people. Selah"}]}]},"6":{"blocks":[{"header":"Psalm 6:1\u20135 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"Yahweh, do not rebuke me in Your anger; do not discipline me in Your wrath."},{"num":2,"text":"Be gracious to me, Yahweh, for I am weak; heal me, Yahweh, for my bones are shaking;"},{"num":3,"text":"my whole being is shaken with terror. And You, Yahweh\u2014how long?"},{"num":4,"text":"Turn, Yahweh! Rescue me; save me because of Your faithful love."},{"num":5,"text":"For there is no remembrance of You in death; who can thank You in Sheol?"}]},{"header":"Psalm 6:6\u201310 (HCSB)","startVerse":6,"endVerse":10,"verses":[{"num":6,"text":"I am weary from my groaning; with my tears I dampen my pillow and drench my bed every night."},{"num":7,"text":"My eyes are swollen from grief; they grow old because of all my enemies."},{"num":8,"text":"Depart from me, all evildoers, for Yahweh has heard the sound of my weeping."},{"num":9,"text":"Yahweh has heard my plea for help; Yahweh accepts my prayer."},{"num":10,"text":"All my enemies will be ashamed and shake with terror; they will turn back and suddenly be disgraced."}]}]},"5":{"blocks":[{"header":"Psalm 5:1\u20136 (HCSB)","startVerse":1,"endVerse":6,"verses":[{"num":1,"text":"Listen to my words, Yahweh; consider my sighing."},{"num":2,"text":"Pay attention to the sound of my cry, my King and my God, for I pray to You."},{"num":3,"text":"At daybreak, Yahweh, You hear my voice; at daybreak I plead my case to You and watch expectantly."},{"num":4,"text":"For You are not a God who delights in wickedness; evil cannot dwell with You."},{"num":5,"text":"The boastful cannot stand in Your presence; You hate all evildoers."},{"num":6,"text":"You destroy those who tell lies; Yahweh abhors a man of bloodshed and treachery."}]},{"header":"Psalm 5:7\u201312 (HCSB)","startVerse":7,"endVerse":12,"verses":[{"num":7,"text":"But I enter Your house by the abundance of Your faithful love; I bow down toward Your holy temple in reverential awe of You."},{"num":8,"text":"Yahweh, lead me in Your righteousness because of my adversaries; make Your way straight before me."},{"num":9,"text":"For there is nothing reliable in what they say; destruction is within them; their throat is an open grave; they flatter with their tongues."},{"num":10,"text":"Punish them, God; let them fall by their own schemes. Drive them out because of their many crimes, for they rebel against You."},{"num":11,"text":"But let all who take refuge in You rejoice; let them shout for joy forever. May You shelter them, and may those who love Your name boast about You."},{"num":12,"text":"For You, Yahweh, bless the righteous one; You surround him with favor like a shield."}]}]},"7":{"blocks":[{"header":"Psalm 7:1\u20135 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"Yahweh my God, I seek refuge in You; save me from all my pursuers and rescue me"},{"num":2,"text":"or they will tear me like a lion, ripping me apart with no one to rescue me."},{"num":3,"text":"Yahweh my God, if I have done this, if there is injustice on my hands,"},{"num":4,"text":"if I have done harm to one at peace with me or have plundered my adversary without cause,"},{"num":5,"text":"may an enemy pursue and overtake me; may he trample me to the ground and leave my honor in the dust. Selah"}]},{"header":"Psalm 7:6\u20138 (HCSB)","startVerse":6,"endVerse":8,"verses":[{"num":6,"text":"Rise up, Yahweh, in Your anger; lift Yourself up against the fury of my adversaries; awake for me; You have ordained a judgment."},{"num":7,"text":"Let the assembly of peoples gather around You; take Your seat on high over it."},{"num":8,"text":"Yahweh judges the peoples; vindicate me, Yahweh, according to my righteousness and my integrity."}]},{"header":"Psalm 7:9\u201313 (HCSB)","startVerse":9,"endVerse":13,"verses":[{"num":9,"text":"Let the evil of the wicked come to an end, but establish the righteous. The One who examines the thoughts and emotions is a righteous God."},{"num":10,"text":"My shield is with God, who saves the upright in heart."},{"num":11,"text":"God is a righteous judge and a God who shows His wrath every day."},{"num":12,"text":"If anyone does not repent, God will sharpen His sword; He has strung His bow and made it ready."},{"num":13,"text":"He has prepared His deadly weapons; He tips His arrows with fire."}]},{"header":"Psalm 7:14\u201317 (HCSB)","startVerse":14,"endVerse":17,"verses":[{"num":14,"text":"See, the wicked one is pregnant with evil, conceives trouble, and gives birth to deceit."},{"num":15,"text":"He dug a pit and hollowed it out but fell into the hole he had made."},{"num":16,"text":"His trouble comes back on his own head, and his violence falls on the top of his head."},{"num":17,"text":"I will thank Yahweh for His righteousness; I will sing about the name of Yahweh the Most High."}]}]},"9":{"blocks":[{"header":"Psalm 9:1\u20136 (HCSB)","startVerse":1,"endVerse":6,"verses":[{"num":1,"text":"For the choir director: according to Muth-labben. A Davidic psalm I will thank Yahweh with all my heart; I will declare all Your wonderful works."},{"num":2,"text":"I will rejoice and boast about You; I will sing about Your name, Most High."},{"num":3,"text":"When my enemies retreat, they stumble and perish before You."},{"num":4,"text":"For You have upheld my just cause; You are seated on Your throne as a righteous judge."},{"num":5,"text":"You have rebuked the nations: You have destroyed the wicked; You have erased their name forever and ever."},{"num":6,"text":"The enemy has come to eternal ruin; You have uprooted the cities, and the very memory of them has perished."}]},{"header":"Psalm 9:7\u201310 (HCSB)","startVerse":7,"endVerse":10,"verses":[{"num":7,"text":"But Yahweh sits enthroned forever; He has established His throne for judgment."},{"num":8,"text":"He judges the world with righteousness; He executes judgment on the nations with fairness."},{"num":9,"text":"Yahweh is a refuge for the oppressed, a refuge in times of trouble."},{"num":10,"text":"Those who know Your name trust in You because You have not abandoned those who seek You, Yahweh."}]},{"header":"Psalm 9:11\u201314 (HCSB)","startVerse":11,"endVerse":14,"verses":[{"num":11,"text":"Sing to Yahweh, who dwells in Zion; proclaim His deeds among the nations."},{"num":12,"text":"For the One who seeks an accounting for bloodshed remembers them; He does not forget the cry of the afflicted."},{"num":13,"text":"Be gracious to me, Yahweh; consider my affliction at the hands of those who hate me. Lift me up from the gates of death,"},{"num":14,"text":"so that I may declare all Your praises. I will rejoice in Your salvation within the gates of Daughter Zion."}]},{"header":"Psalm 9:15\u201320 (HCSB)","startVerse":15,"endVerse":20,"verses":[{"num":15,"text":"The nations have fallen into the pit they made; their foot is caught in the net they have concealed."},{"num":16,"text":"Yahweh has revealed Himself; He has executed justice, striking down the wicked by the work of their hands.  Higgaion.   Selah"},{"num":17,"text":"The wicked will return to Sheol \u2014 all the nations that forget God."},{"num":18,"text":"For the oppressed will not always be forgotten; the hope of the afflicted will not perish forever."},{"num":19,"text":"Rise up, Yahweh! Do not let man prevail; let the nations be judged in Your presence."},{"num":20,"text":"Put terror in them, Yahweh; let the nations know they are only men. Selah"}]}]},"10":{"blocks":[{"header":"Psalm 10:1\u20134 (HCSB)","startVerse":1,"endVerse":4,"verses":[{"num":1,"text":"Yahweh, why do You stand so far away? Why do You hide in times of trouble?"},{"num":2,"text":"In arrogance the wicked relentlessly pursue the afflicted; let them be caught in the schemes they have devised."},{"num":3,"text":"For the wicked one boasts about his own cravings; the one who is greedy curses and despises Yahweh."},{"num":4,"text":"In all his scheming, the wicked arrogantly thinks: \u201cThere is no accountability, since God does not exist.\u201d"}]},{"header":"Psalm 10:5\u201311 (HCSB)","startVerse":5,"endVerse":11,"verses":[{"num":5,"text":"His ways are always secure; Your lofty judgments are beyond his sight; he scoffs at all his adversaries."},{"num":6,"text":"He says to himself, \u201cI will never be moved\u2014 from generation to generation without calamity.\u201d"},{"num":7,"text":"Cursing, deceit, and violence fill his mouth; trouble and malice are under his tongue."},{"num":8,"text":"He waits in ambush near the villages; he kills the innocent in secret places. His eyes are on the lookout for the helpless;"},{"num":9,"text":"he lurks in secret like a lion in a thicket. He lurks in order to seize the afflicted; he seizes the afflicted and drags him in his net."},{"num":10,"text":"So he is oppressed and beaten down; the helpless fall because of his strength."},{"num":11,"text":"He says to himself, \u201cGod has forgotten; He hides His face and will never see.\u201d"}]},{"header":"Psalm 10:12\u201315 (HCSB)","startVerse":12,"endVerse":15,"verses":[{"num":12,"text":"Rise up, Yahweh God! Lift up Your hand. Do not forget the afflicted."},{"num":13,"text":"Why has the wicked person despised God? He says to himself, \u201cYou will not demand an account.\u201d"},{"num":14,"text":"But You Yourself have seen trouble and grief, observing it in order to take the matter into Your hands. The helpless entrusts himself to You; You are a helper of the fatherless."},{"num":15,"text":"Break the arm of the wicked and evil person; call his wickedness into account until nothing remains of it."}]},{"header":"Psalm 10:16\u201318 (HCSB)","startVerse":16,"endVerse":18,"verses":[{"num":16,"text":"Yahweh is King forever and ever; the nations will perish from His land."},{"num":17,"text":"Yahweh, You have heard the desire of the humble; You will strengthen their hearts. You will listen carefully,"},{"num":18,"text":"doing justice for the fatherless and the oppressed so that men of the earth may terrify them no more."}]}]},"8":{"blocks":[{"header":"Psalm 8:1\u20132 (HCSB)","startVerse":1,"endVerse":2,"verses":[{"num":1,"text":"For the choir director: on the Gittith. A Davidic psalm Yahweh, our Lord, how magnificent is Your name throughout the earth! You have covered the heavens with Your majesty."},{"num":2,"text":"Because of Your adversaries, You have established a stronghold from the mouths of children and nursing infants to silence the enemy and the avenger."}]},{"header":"Psalm 8:3\u20139 (HCSB)","startVerse":3,"endVerse":9,"verses":[{"num":3,"text":"When I observe Your heavens, the work of Your fingers, the moon and the stars, which You set in place,"},{"num":4,"text":"what is man that You remember him, the son of man that You look after him?"},{"num":5,"text":"You made him little less than God and crowned him with glory and honor."},{"num":6,"text":"You made him lord over the works of Your hands; You put everything under his feet:"},{"num":7,"text":"all the sheep and oxen, as well as the animals in the wild,"},{"num":8,"text":"the birds of the sky, and the fish of the sea that pass through the currents of the seas."},{"num":9,"text":"Yahweh, our Lord, how magnificent is Your name throughout the earth!"}]}]},"12":{"blocks":[{"header":"Psalm 12:1\u20134 (HCSB)","startVerse":1,"endVerse":4,"verses":[{"num":1,"text":"For the choir director: according to Sheminith.  A Davidic psalm Help, Yahweh, for no faithful one remains; the loyal have disappeared from the human race."},{"num":2,"text":"They lie to one another; they speak with flattering lips and deceptive hearts."},{"num":3,"text":"May Yahweh cut off all flattering lips and the tongue that speaks boastfully."},{"num":4,"text":"They say, \u201cThrough our tongues we have power; our lips are our own\u2014who can be our master?\u201d"}]},{"header":"Psalm 12:5\u20138 (HCSB)","startVerse":5,"endVerse":8,"verses":[{"num":5,"text":"\u201cBecause of the oppression of the afflicted and the groaning of the poor, I will now rise up,\u201d says Yahweh. \u201cI will put the one who longs for it in a safe place.\u201d"},{"num":6,"text":"The words of Yahweh are pure words, like silver refined in an earthen furnace, purified seven times."},{"num":7,"text":"You, Yahweh, will guard us; You will protect us from this generation forever."},{"num":8,"text":"The wicked wander everywhere, and what is worthless is exalted by the human race."}]}]},"13":{"blocks":[{"header":"Psalm 13 (HCSB)","startVerse":1,"endVerse":6,"verses":[{"num":1,"text":"For the choir director. A Davidic psalm Yahweh, how long will You forget me? Forever? How long will You hide Your face from me?"},{"num":2,"text":"How long will I store up anxious concerns within me, agony in my mind every day? How long will my enemy dominate me?"},{"num":3,"text":"Consider me and answer, Yahweh my God. Restore brightness to my eyes; otherwise, I will sleep in death."},{"num":4,"text":"My enemy will say, \u201cI have triumphed over him,\u201d and my foes will rejoice because I am shaken."},{"num":5,"text":"But I have trusted in Your faithful love; my heart will rejoice in Your deliverance."},{"num":6,"text":"I will sing to Yahweh because He has treated me generously."}]}]},"11":{"blocks":[{"header":"Psalm 11:1\u20133 (HCSB)","startVerse":1,"endVerse":3,"verses":[{"num":1,"text":"For the choir director. Davidic I have taken refuge in Yahweh. How can you say to me, \u201cEscape to the mountain like a bird!"},{"num":2,"text":"For look, the wicked string the bow; they put the arrow on the bowstring to shoot from the shadows at the upright in heart."},{"num":3,"text":"When the foundations are destroyed, what can the righteous do?\u201d"}]},{"header":"Psalm 11:4\u20137 (HCSB)","startVerse":4,"endVerse":7,"verses":[{"num":4,"text":"Yahweh is in His holy temple; Yahweh\u2019s throne is in heaven. His eyes watch; He examines everyone."},{"num":5,"text":"Yahweh examines the righteous and the wicked. He hates the lover of violence."},{"num":6,"text":"He will rain burning coals and sulfur on the wicked; a scorching wind will be their portion."},{"num":7,"text":"For Yahweh is righteous; He loves righteous deeds. The upright will see His face."}]}]},"14":{"blocks":[{"header":"Psalm 14 (HCSB)","startVerse":1,"endVerse":7,"verses":[{"num":1,"text":"For the choir director. Davidic The fool says in his heart, \u201cGod does not exist.\u201d They are corrupt; they do vile deeds. There is no one who does good."},{"num":2,"text":"Yahweh looks down from heaven on the human race to see if there is one who is wise, one who seeks God."},{"num":3,"text":"All have turned away; all alike have become corrupt. There is no one who does good, not even one."},{"num":4,"text":"Will evildoers never understand? They consume My people as they consume bread; they do not call on Yahweh."},{"num":5,"text":"Then they will be filled with terror, for God is with those who are righteous."},{"num":6,"text":"You sinners frustrate the plans of the afflicted, but Yahweh is his refuge."},{"num":7,"text":"Oh, that Israel\u2019s deliverance would come from Zion! When Yahweh restores the fortunes of His people, Jacob will rejoice; Israel will be glad."}]}]},"17":{"blocks":[{"header":"Psalm 17:1\u20135 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"A Davidic prayer Yahweh, hear a just cause; pay attention to my cry; listen to my prayer\u2014 from lips free of deceit."},{"num":2,"text":"Let my vindication come from You, for You see what is right."},{"num":3,"text":"You have tested my heart; You have examined me at night. You have tried me and found nothing evil; I have determined that my mouth will not sin."},{"num":4,"text":"Concerning what people do: by the word of Your lips I have avoided the ways of the violent."},{"num":5,"text":"My steps are on Your paths; my feet have not slipped."}]},{"header":"Psalm 17:6\u20139 (HCSB)","startVerse":6,"endVerse":9,"verses":[{"num":6,"text":"I call on You, God, because You will answer me; listen closely to me; hear what I say."},{"num":7,"text":"Display the wonders of Your faithful love, Savior of all who seek refuge from those who rebel against Your right hand."},{"num":8,"text":"Protect me as the pupil of Your eye; hide me in the shadow of Your wings"},{"num":9,"text":"from the wicked who treat me violently, my deadly enemies who surround me."}]},{"header":"Psalm 17:10\u201312 (HCSB)","startVerse":10,"endVerse":12,"verses":[{"num":10,"text":"They have become hardened; their mouths speak arrogantly."},{"num":11,"text":"They advance against me; now they surround me. They are determined to throw me to the ground."},{"num":12,"text":"They are like a lion eager to tear, like a young lion lurking in ambush."}]},{"header":"Psalm 17:13\u201315 (HCSB)","startVerse":13,"endVerse":15,"verses":[{"num":13,"text":"Rise up, Yahweh! Confront him; bring him down.With Your sword, save me from the wicked."},{"num":14,"text":"With Your hand, Yahweh, save me from men, from men of the world whose portion is in this life: You fill their bellies with what You have in store; their sons are satisfied, and they leave their surplus to their children."},{"num":15,"text":"But I will see Your face in righteousness; when I awake, I will be satisfied with Your presence."}]}]},"16":{"blocks":[{"header":"Psalm 16:1-4 (HCSB)","startVerse":1,"endVerse":4,"verses":[{"num":1,"text":"A Davidic Miktam Protect me, God, for I take refuge in You."},{"num":2,"text":"I said to Yahweh, \u201cYou are my Lord; I have nothing good besides You.\u201d"},{"num":3,"text":"As for the holy people who are in the land, they are the noble ones. All my delight is in them."},{"num":4,"text":"The sorrows of those who take another god for themselves will multiply; I will not pour out their drink offerings of blood, and I will not speak their names with my lips."}]},{"header":"Psalm 16:5\u20138 (HCSB)","startVerse":5,"endVerse":8,"verses":[{"num":5,"text":"Yahweh, You are my portion and my cup of blessing; You hold my future."},{"num":6,"text":"The boundary lines have fallen for me in pleasant places; indeed, I have a beautiful inheritance."},{"num":7,"text":"I will praise Yahweh who counsels me \u2014even at night my conscience instructs me."},{"num":8,"text":"I keep Yahweh in mind always. Because He is at my right hand, I will not be shaken."}]},{"header":"Psalm 16:9\u201311 (HCSB)","startVerse":9,"endVerse":11,"verses":[{"num":9,"text":"Therefore my heart is glad and my spirit rejoices; my body also rests securely."},{"num":10,"text":"For You will not abandon me to Sheol; You will not allow Your Faithful One to see decay."},{"num":11,"text":"You reveal the path of life to me; in Your presence is abundant joy; in Your right hand are eternal pleasures."}]}]},"15":{"blocks":[{"header":"Psalm 15 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"A Davidic psalm Yahweh, who can dwell in Your tent? Who can live on Your holy mountain?"},{"num":2,"text":"The one who lives honestly, practices righteousness, and acknowledges the truth in his heart \u2014"},{"num":3,"text":"who does not slander with his tongue, who does not harm his friend or discredit his neighbor,"},{"num":4,"text":"who despises the one rejected by Yahweh but honors those who fear Yahweh, who keeps his word whatever the cost,"},{"num":5,"text":"who does not lend his money at interest or take a bribe against the innocent \u2014 the one who does these things will never be moved."}]}]},"18":{"blocks":[{"header":"Psalm 18:1-3 (HCSB)","startVerse":1,"endVerse":3,"verses":[{"num":1,"text":"For the choir director. Of the servant of Yahweh, David, who spoke the words of this song to Yahweh on the day Yahweh rescued him from the hand of all his enemies and from the hand of Saul. He said: I love You, Yahweh, my strength."},{"num":2,"text":"Yahweh is my rock, my fortress, and my deliverer, my God, my mountain where I seek refuge, my shield and the horn of my salvation, my stronghold."},{"num":3,"text":"I called to Yahweh, who is worthy of praise, and I was saved from my enemies."}]},{"header":"Psalm 18:4\u20136 (HCSB)","startVerse":4,"endVerse":6,"verses":[{"num":4,"text":"The ropes of death were wrapped around me; the torrents of destruction terrified me."},{"num":5,"text":"The ropes of Sheol entangled me; the snares of death confronted me."},{"num":6,"text":"I called to Yahweh in my distress, and I cried to my God for help. From His temple He heard my voice, and my cry to Him reached His ears."}]},{"header":"Psalm 18:7\u201315 (HCSB)","startVerse":7,"endVerse":15,"verses":[{"num":7,"text":"Then the earth shook and quaked; the foundations of the mountains trembled; they shook because He burned with anger."},{"num":8,"text":"Smoke rose from His nostrils, and consuming fire came from His mouth; coals were set ablaze by it."},{"num":9,"text":"He parted the heavens and came down, a dark cloud beneath His feet."},{"num":10,"text":"He rode on a cherub and flew, soaring on the wings of the wind."},{"num":11,"text":"He made darkness His hiding place, dark storm clouds His canopy around Him."},{"num":12,"text":"From the radiance of His presence, His clouds swept onward with hail and blazing coals."},{"num":13,"text":"Yahweh thundered from heaven; the Most High projected His voice."},{"num":14,"text":"He shot His arrows and scattered them; He hurled lightning bolts and routed them."},{"num":15,"text":"The depths of the sea became visible, the foundations of the world were exposed, at Your rebuke, Yahweh, at the blast of the breath of Your nostrils."}]},{"header":"Psalm 18:16\u201319 (HCSB)","startVerse":16,"endVerse":19,"verses":[{"num":16,"text":"He reached down from heaven and took hold of me; He pulled me out of deep waters."},{"num":17,"text":"He rescued me from my powerful enemy and from those who hated me, for they were too strong for me."},{"num":18,"text":"They confronted me in the day of my distress, but Yahweh was my support."},{"num":19,"text":"He brought me out to a spacious place; He rescued me because He delighted in me."}]},{"header":"Psalm 18:20\u201324 (HCSB)","startVerse":20,"endVerse":24,"verses":[{"num":20,"text":"Yahweh rewarded me according to my righteousness; He repaid me according to the cleanness of my hands."},{"num":21,"text":"For I have kept the ways of Yahweh and have not turned from my God to wickedness."},{"num":22,"text":"Indeed, I have kept all His ordinances in mind and have not disregarded His statutes."},{"num":23,"text":"I was blameless toward Him and kept myself from sinning."},{"num":24,"text":"So Yahweh repaid me according to my righteousness, according to the cleanness of my hands in His sight."}]},{"header":"Psalm 18:25\u201329 (HCSB)","startVerse":25,"endVerse":29,"verses":[{"num":25,"text":"With the faithful You prove Yourself faithful; with the blameless man You prove Yourself blameless;"},{"num":26,"text":"with the pure You prove Yourself pure, but with the crooked You prove Yourself shrewd."},{"num":27,"text":"For You rescue an afflicted people, but You humble those with haughty eyes."},{"num":28,"text":"Yahweh, You light my lamp; my God illuminates my darkness."},{"num":29,"text":"With You I can attack a barrier, and with my God I can leap over a wall."}]},{"header":"Psalm 18:30\u201336 (HCSB)","startVerse":30,"endVerse":36,"verses":[{"num":30,"text":"God\u2014His way is perfect; the word of Yahweh is pure. He is a shield to all who take refuge in Him."},{"num":31,"text":"For who is God besides Yahweh? And who is a rock? Only our God."},{"num":32,"text":"God\u2014He clothes me with strength and makes my way perfect."},{"num":33,"text":"He makes my feet like the feet of a deer and sets me securely on the heights."},{"num":34,"text":"He trains my hands for war; my arms can bend a bow of bronze."},{"num":35,"text":"You have given me the shield of Your salvation; Your right hand upholds me, and Your humility exalts me."},{"num":36,"text":"You widen a place beneath me for my steps, and my ankles do not give way."}]},{"header":"Psalm 18:37\u201342 (HCSB)","startVerse":37,"endVerse":42,"verses":[{"num":37,"text":"I pursue my enemies and overtake them; I do not turn back until they are wiped out."},{"num":38,"text":"I crush them, and they cannot get up; they fall beneath my feet."},{"num":39,"text":"You have clothed me with strength for battle; You subdue my adversaries beneath me."},{"num":40,"text":"You have made my enemies retreat before me; I annihilate those who hate me."},{"num":41,"text":"They cry for help, but there is no one to save them \u2014 they cry to Yahweh, but He does not answer them."},{"num":42,"text":"I pulverize them like dust before the wind; I trample them like mud in the streets."}]},{"header":"Psalm 18:43\u201345 (HCSB)","startVerse":43,"endVerse":45,"verses":[{"num":43,"text":"You have freed me from the feuds among the people; You have appointed me the head of nations; a people I had not known serve me."},{"num":44,"text":"Foreigners submit to me grudgingly; as soon as they hear, they obey me."},{"num":45,"text":"Foreigners lose heart and come trembling from their fortifications."}]},{"header":"Psalm 18:46\u201350 (HCSB)","startVerse":46,"endVerse":50,"verses":[{"num":46,"text":"Yahweh lives\u2014may my rock be praised! The God of my salvation is exalted."},{"num":47,"text":"God\u2014He gives me vengeance and subdues peoples under me."},{"num":48,"text":"He frees me from my enemies. You exalt me above my adversaries; You rescue me from violent men."},{"num":49,"text":"Therefore I will praise You, Yahweh, among the nations; I will sing about Your name."},{"num":50,"text":"He gives great victories to His king; He shows loyalty to His anointed, to David and his descendants forever."}]}]},"20":{"blocks":[{"header":"Psalm 20:1-5 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"For the choir director. A Davidic psalm May Yahweh answer you in a day of trouble; may the name of Jacob\u2019s God protect you."},{"num":2,"text":"May He send you help from the sanctuary and sustain you from Zion."},{"num":3,"text":"May He remember all your offerings and accept your burnt offering. Selah"},{"num":4,"text":"May He give you what your heart desires and fulfill your whole purpose."},{"num":5,"text":"Let us shout for joy at your victory and lift the banner in the name of our God. May Yahweh fulfill all your requests."}]},{"header":"Psalm 20:6\u20139 (HCSB)","startVerse":6,"endVerse":9,"verses":[{"num":6,"text":"Now I know that Yahweh gives victory to His     anointed; He will answer him from His holy heaven with mighty victories from His right hand."},{"num":7,"text":"Some take pride in chariots, and others in     horses, but we take pride in the name of Yahweh our God."},{"num":8,"text":"They collapse and fall, but we rise and stand firm."},{"num":9,"text":"Yahweh, give victory to the king! May He answer us on the day that we call."}]}]},"21":{"blocks":[{"header":"Psalm 21:1-7 (HCSB)","startVerse":1,"endVerse":7,"verses":[{"num":1,"text":"For the choir director. A Davidic psalm Yahweh, the king finds joy in Your strength. How greatly he rejoices in Your victory!"},{"num":2,"text":"You have given him his heart\u2019s desire and have not denied the request of his lips. Selah"},{"num":3,"text":"For You meet him with rich blessings; You place a crown of pure gold on his head."},{"num":4,"text":"He asked You for life, and You gave it to him\u2014 length of days forever and ever."},{"num":5,"text":"His glory is great through Your victory; You confer majesty and splendor on him."},{"num":6,"text":"You give him blessings forever; You cheer him with joy in Your presence."},{"num":7,"text":"For the king relies on Yahweh; through the faithful love of the Most High he is not shaken."}]},{"header":"Psalm 21:8\u201313 (HCSB)","startVerse":8,"endVerse":13,"verses":[{"num":8,"text":"Your hand will capture all your enemies; your right hand will seize those who hate you."},{"num":9,"text":"You will make them burn like a fiery furnace when you appear; Yahweh will engulf them in His wrath, and fire will devour them."},{"num":10,"text":"You will wipe their descendants from the earth and their offspring from the human race."},{"num":11,"text":"Though they intend to harm you and devise a wicked plan, they will not prevail."},{"num":12,"text":"Instead, you will put them to flight when you aim your bow at their faces."},{"num":13,"text":"Be exalted, Yahweh, in Your strength; we will sing and praise Your might."}]}]},"19":{"blocks":[{"header":"Psalm 19:1\u20134 (HCSB)","startVerse":1,"endVerse":4,"verses":[{"num":1,"text":"For the choir director. A Davidic psalm The heavens declare the glory of God, and the sky proclaims the work of His hands."},{"num":2,"text":"Day after day they pour out speech; night after night they communicate knowledge."},{"num":3,"text":"There is no speech; there are no words; their voice is not heard."},{"num":4,"text":"Their message has gone out to all the earth, and their words to the ends of the world. In the heavens He has pitched a tent for the sun."}]},{"header":"Psalm 19:5\u20136 (HCSB)","startVerse":5,"endVerse":6,"verses":[{"num":5,"text":"It is like a groom coming     from the bridal chamber; it rejoices like an athlete running a     course."},{"num":6,"text":"It rises from one end of the heavens and circles to their other end; nothing is hidden from its heat."}]},{"header":"Psalm 19:7\u201311 (HCSB)","startVerse":7,"endVerse":11,"verses":[{"num":7,"text":"The instruction of Yahweh is perfect, renewing one\u2019s life; the testimony of Yahweh is trustworthy, making the inexperienced wise."},{"num":8,"text":"The precepts of Yahweh are right, making the heart glad; the command of Yahweh is radiant, making the eyes light up."},{"num":9,"text":"The fear of Yahweh is pure, enduring forever; the ordinances of Yahweh are reliable and altogether righteous."},{"num":10,"text":"They are more desirable than gold\u2014 than an abundance of pure gold; and sweeter than honey, which comes from the honeycomb."},{"num":11,"text":"In addition, Your servant is warned by them; there is great reward in keeping them."}]},{"header":"Psalm 19:12\u201314 (HCSB)","startVerse":12,"endVerse":14,"verses":[{"num":12,"text":"Who perceives his unintentional sins? Cleanse me from my hidden faults."},{"num":13,"text":"Moreover, keep Your servant from willful sins; do not let them rule over me. Then I will be innocent and cleansed from blatant rebellion."},{"num":14,"text":"May the words of my mouth and the meditation of my heart be acceptable to You, Yahweh, my rock and my Redeemer."}]}]},"22":{"blocks":[{"header":"Psalm 22:1-5 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"For the choir director: according to \u201cThe Deer of the Dawn.\u201d A Davidic psalm My God, my God, why have You forsaken me? Why are You so far from my deliverance and from my words of groaning?"},{"num":2,"text":"My God, I cry by day, but You do not answer, by night, yet I have no rest."},{"num":3,"text":"But You are holy, enthroned on the praises of Israel."},{"num":4,"text":"Our fathers trusted in You; they trusted, and You rescued them."},{"num":5,"text":"They cried to You and were set free; they trusted in You and were not disgraced."}]},{"header":"Psalm 22:6\u20138 (HCSB)","startVerse":6,"endVerse":8,"verses":[{"num":6,"text":"But I am a worm and not a man, scorned by men and despised by people."},{"num":7,"text":"Everyone who sees me mocks me; they sneer and shake their heads:"},{"num":8,"text":"\u201cHe relies on Yahweh; let Him rescue him; let Yahweh deliver him, since He takes pleasure in him.\u201d"}]},{"header":"Psalm 22:9\u201311 (HCSB)","startVerse":9,"endVerse":11,"verses":[{"num":9,"text":"You took me from the womb, making me secure while at my mother\u2019s     breast."},{"num":10,"text":"I was given over to You at birth; You have been my God from my mother\u2019s       womb."},{"num":11,"text":"Do not be far from me, because distress is        near and there is no one to help."}]},{"header":"Psalm 22:12\u201318 (HCSB)","startVerse":12,"endVerse":18,"verses":[{"num":12,"text":"Many bulls surround me; strong ones of Bashan encircle me."},{"num":13,"text":"They open their mouths against me\u2014 lions, mauling and roaring."},{"num":14,"text":"I am poured out like water, and all my bones are disjointed; my heart is like wax, melting within me."},{"num":15,"text":"My strength is dried up like baked clay; my tongue sticks to the roof of my mouth. You put me into the dust of death."},{"num":16,"text":"For dogs have surrounded me; a gang of evildoers has closed in on me; they pierced my hands and my feet."},{"num":17,"text":"I can count all my bones; people look and stare at me."},{"num":18,"text":"They divided my garments among themselves, and they cast lots for my clothing."}]},{"header":"Psalm 22:19\u201321 (HCSB)","startVerse":19,"endVerse":21,"verses":[{"num":19,"text":"But You, Yahweh, don\u2019t be far away. My strength, come quickly to help me."},{"num":20,"text":"Deliver my life from the sword, my only life from the power of these       dogs."},{"num":21,"text":"Save me from the mouth of the lion! You have rescued me from the horns of the wild oxen."}]},{"header":"Psalm 22:22\u201324 (HCSB)","startVerse":22,"endVerse":24,"verses":[{"num":22,"text":"I will proclaim Your name to my brothers; I will praise You in the congregation."},{"num":23,"text":"You who fear Yahweh, praise Him! All you descendants of Jacob, honor Him! All you descendants of Israel, revere Him!"},{"num":24,"text":"For He has not despised or detested the torment of the afflicted. He did not hide His face from him but listened when he cried to Him for help."}]},{"header":"Psalm 22:25\u201326 (HCSB)","startVerse":25,"endVerse":26,"verses":[{"num":25,"text":"I will give praise in the great       congregation because of You; I will fulfill my vows before those who fear You."},{"num":26,"text":"The humble will eat and be satisfied; those who seek Yahweh will praise Him. May your hearts live forever!"}]},{"header":"Psalm 22:27\u201331 (HCSB)","startVerse":27,"endVerse":31,"verses":[{"num":27,"text":"All the ends of the earth will remember and turn to Yahweh. All the families of the nations will bow down before You,"},{"num":28,"text":"for kingship belongs to Yahweh; He rules over the nations."},{"num":29,"text":"All who prosper on earth will eat and bow down; all those who go down to the dust will kneel before Him\u2014 even the one who cannot preserve his life."},{"num":30,"text":"Their descendants will serve Him; the next generation will be told about the Lord."},{"num":31,"text":"They will come and tell a people yet to be born about His righteousness\u2014 what He has done."}]}]},"23":{"blocks":[{"header":"Psalm 23:1-4 (HCSB)","startVerse":1,"endVerse":4,"verses":[{"num":1,"text":"A Davidic psalm Yahweh is my shepherd; there is nothing I lack."},{"num":2,"text":"He lets me lie down in green pastures; He leads me beside quiet waters."},{"num":3,"text":"He renews my life; He leads me along the right paths for His name\u2019s sake."},{"num":4,"text":"Even when I go through the darkest valley, I fear no danger, for You are with me; Your rod and Your staff \u2014they comfort me."}]},{"header":"Psalm 23:5\u20136 (HCSB)","startVerse":5,"endVerse":6,"verses":[{"num":5,"text":"You prepare a table before me in the presence of my enemies; You anoint my head with oil; my cup overflows."},{"num":6,"text":"Only goodness and faithful love will     pursue me all the days of my life, and I will dwell in the house of Yahweh as long as I live."}]}]},"24":{"blocks":[{"header":"Psalm 24:1\u20136 (HCSB)","startVerse":1,"endVerse":6,"verses":[{"num":1,"text":"The earth and everything in it, the world and its inhabitants, belong to Yahweh;"},{"num":2,"text":"for He laid its foundation on the seas and established it on the rivers."},{"num":3,"text":"Who may ascend the mountain of Yahweh? Who may stand in His holy place?"},{"num":4,"text":"The one who has clean hands and a pure heart, who has not set his mind on what is false, and who has not sworn deceitfully."},{"num":5,"text":"He will receive blessing from Yahweh, and righteousness from the God of his salvation."},{"num":6,"text":"Such is the generation of those who seek Him, who seek the face of the God of Jacob. Selah"}]},{"header":"Psalm 24:7\u201310 (HCSB)","startVerse":7,"endVerse":10,"verses":[{"num":7,"text":"Lift up your heads, you gates! Rise up, ancient doors! Then the King of glory will come in."},{"num":8,"text":"Who is this King of glory? Yahweh, strong and mighty, Yahweh, mighty in battle."},{"num":9,"text":"Lift up your heads, you gates! Rise up, ancient doors! Then the King of glory will come in."},{"num":10,"text":"Who is He, this King of glory? Yahweh of Hosts, He is the King of glory. Selah"}]}]},"25":{"blocks":[{"header":"Psalm 25:1\u20133 (HCSB)","startVerse":1,"endVerse":3,"verses":[{"num":1,"text":"Yahweh, I turn to You."},{"num":2,"text":"My God, I trust in You. Do not let me be disgraced; do not let my enemies gloat over me."},{"num":3,"text":"No one who waits for You will be disgraced; those who act treacherously without cause will be disgraced."}]},{"header":"Psalm 25:4\u20137 (HCSB)","startVerse":4,"endVerse":7,"verses":[{"num":4,"text":"Make Your ways known to me, Yahweh; teach me Your paths."},{"num":5,"text":"Guide me in Your truth and teach me, for You are the God of my salvation; I wait for You all day long."},{"num":6,"text":"Remember, Yahweh, Your compassion and Your faithful love, for they have existed from antiquity."},{"num":7,"text":"Do not remember the sins of my youth or my acts of rebellion; in keeping with Your faithful love, remember me because of Your goodness, Yahweh."}]},{"header":"Psalm 25:8\u201315 (HCSB)","startVerse":8,"endVerse":15,"verses":[{"num":8,"text":"Yahweh is good and upright; therefore He shows sinners the way."},{"num":9,"text":"He leads the humble in what is right and teaches them His way."},{"num":10,"text":"All Yahweh\u2019s ways show faithful love and truth to those who keep His covenant and decrees."},{"num":11,"text":"Because of Your name, Yahweh, forgive my sin, for it is great."},{"num":12,"text":"Who is the man who fears Yahweh? He will show him the way he should choose."},{"num":13,"text":"He will live a good life, and his descendants will inherit the land."},{"num":14,"text":"The secret counsel of Yahweh is for those who fear Him, and He reveals His covenant to them."},{"num":15,"text":"My eyes are always on Yahweh, for He will pull my feet out of the net."}]},{"header":"Psalm 25:16\u201322 (HCSB)","startVerse":16,"endVerse":22,"verses":[{"num":16,"text":"Turn to me and be gracious to me, for I am alone and afflicted."},{"num":17,"text":"The distresses of my heart increase; bring me out of my sufferings."},{"num":18,"text":"Consider my affliction and trouble, and take away all my sins."},{"num":19,"text":"Consider my enemies; they are numerous, and they hate me violently."},{"num":20,"text":"Guard me and deliver me; do not let me be put to shame, for I take refuge in You."},{"num":21,"text":"May integrity and what is right watch over me, for I wait for You."},{"num":22,"text":"God, redeem Israel, from all its distresses."}]}]},"26":{"blocks":[{"header":"Psalm 26:1\u20137 (HCSB)","startVerse":1,"endVerse":7,"verses":[{"num":1,"text":"Vindicate me, Yahweh, because I have lived with integrity and have trusted in Yahweh without wavering."},{"num":2,"text":"Test me, Yahweh, and try me; examine my heart and mind."},{"num":3,"text":"For Your faithful love is before my eyes, and I live by Your truth."},{"num":4,"text":"I do not sit with the worthless or associate with hypocrites."},{"num":5,"text":"I hate a crowd of evildoers, and I do not sit with the wicked."},{"num":6,"text":"I wash my hands in innocence and go around Your altar, Yahweh,"},{"num":7,"text":"raising my voice in thanksgiving and telling about Your wonderful works."}]},{"header":"Psalm 26:8\u201312 (HCSB)","startVerse":8,"endVerse":12,"verses":[{"num":8,"text":"Yahweh, I love the house where You dwell, the place where Your glory resides."},{"num":9,"text":"Do not destroy me along with sinners, or my life along with men of bloodshed"},{"num":10,"text":"in whose hands are evil schemes and whose right hands are filled with bribes."},{"num":11,"text":"But I live with integrity; redeem me and be gracious to me."},{"num":12,"text":"My foot stands on level ground; I will praise Yahweh in the assemblies."}]}]},"27":{"blocks":[{"header":"Psalm 27:1\u20133 (HCSB)","startVerse":1,"endVerse":3,"verses":[{"num":1,"text":"Yahweh is my light and my salvation\u2014 whom should I fear? Yahweh is the stronghold of my life\u2014 of whom should I be afraid?"},{"num":2,"text":"When evildoers came against me to devour my flesh, my foes and my enemies stumbled and fell."},{"num":3,"text":"Though an army deploys against me, my heart is not afraid; though a war breaks out against me, still I am confident."}]},{"header":"Psalm 27:4\u20136 (HCSB)","startVerse":4,"endVerse":6,"verses":[{"num":4,"text":"I have asked one thing from Yahweh; it is what I desire: to dwell in the house of Yahweh all the days of my life, gazing on the beauty of Yahweh and seeking Him in His temple."},{"num":5,"text":"For He will conceal me in His shelter in the day of adversity; He will hide me under the cover of His tent; He will set me high on a rock."},{"num":6,"text":"Then my head will be high above my enemies around me; I will offer sacrifices in His tent with shouts of joy. I will sing and make music to Yahweh."}]},{"header":"Psalm 27:7\u201310 (HCSB)","startVerse":7,"endVerse":10,"verses":[{"num":7,"text":"Yahweh, hear my voice when I call; be gracious to me and answer me."},{"num":8,"text":"My heart says this about You, \u201cYou are to seek My face.\u201d Yahweh, I will seek Your face."},{"num":9,"text":"Do not hide Your face from me; do not turn Your servant away in anger. You have been my helper; do not leave me or abandon me, God of my salvation."},{"num":10,"text":"Even if my father and mother abandon me, Yahweh cares for me."}]},{"header":"Psalm 27:11\u201314 (HCSB)","startVerse":11,"endVerse":14,"verses":[{"num":11,"text":"Because of my adversaries, show me Your way, Yahweh, and lead me on a level path."},{"num":12,"text":"Do not give me over to the will of my foes, for false witnesses rise up against me, breathing violence."},{"num":13,"text":"I am certain that I will see Yahweh\u2019s goodness in the land of the living."},{"num":14,"text":"Wait for Yahweh; be strong and courageous. Wait for Yahweh."}]}]},"29":{"blocks":[{"header":"Psalm 29:1\u20132 (HCSB)","startVerse":1,"endVerse":2,"verses":[{"num":1,"text":"Ascribe to Yahweh, you heavenly beings, ascribe to Yahweh glory and strength."},{"num":2,"text":"Ascribe to Yahweh the glory due His name; worship Yahweh in the splendor of His holiness."}]},{"header":"Psalm 29:3\u201311 (HCSB)","startVerse":3,"endVerse":11,"verses":[{"num":3,"text":"The voice of Yahweh is above the waters. The God of glory thunders\u2014 Yahweh, above vast waters,"},{"num":4,"text":"the voice of Yahweh in power, the voice of Yahweh in splendor."},{"num":5,"text":"The voice of Yahweh breaks the cedars; Yahweh shatters the cedars of Lebanon."},{"num":6,"text":"He makes Lebanon skip like a calf, and Sirion, like a young wild ox."},{"num":7,"text":"The voice of Yahweh flashes flames of fire."},{"num":8,"text":"The voice of Yahweh shakes the wilderness; Yahweh shakes the wilderness of Kadesh."},{"num":9,"text":"The voice of Yahweh makes the deer give birth and strips the woodlands bare. In His temple all cry, \u201cGlory!\u201d"},{"num":10,"text":"Yahweh sat enthroned at the flood; Yahweh sits enthroned, King forever."},{"num":11,"text":"Yahweh gives His people strength; Yahweh blesses His people with peace."}]}]},"28":{"blocks":[{"header":"Psalm 28:1\u20135 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"Yahweh, I call to You; my rock, do not be deaf to me. If You remain silent to me, I will be like those going down to the Pit."},{"num":2,"text":"Listen to the sound of my pleading when I cry to You for help, when I lift up my hands toward Your holy sanctuary."},{"num":3,"text":"Do not drag me away with the wicked, with the evildoers, who speak in friendly ways with their neighbors while malice is in their hearts."},{"num":4,"text":"Repay them according to what they have done\u2014 according to the evil of their deeds. Repay them according to the work of their hands; give them back what they deserve."},{"num":5,"text":"Because they do not consider what Yahweh has done or the work of His hands, He will tear them down and not rebuild them."}]},{"header":"Psalm 28:6\u20139 (HCSB)","startVerse":6,"endVerse":9,"verses":[{"num":6,"text":"May Yahweh be praised, for He has heard the sound of my pleading."},{"num":7,"text":"Yahweh is my strength and my shield; my heart trusts in Him, and I am helped. Therefore my heart rejoices, and I praise Him with my song."},{"num":8,"text":"Yahweh is the strength of His people; He is a stronghold of salvation for His anointed."},{"num":9,"text":"Save Your people, bless Your possession, shepherd them, and carry them forever."}]}]},"30":{"blocks":[{"header":"Psalm 30:1\u20135 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"A psalm; a dedication song for the house. Davidic I will exalt You, Yahweh, because You have lifted me up and have not allowed my enemies to triumph over me."},{"num":2,"text":"Yahweh my God, I cried to You for help, and You healed me."},{"num":3,"text":"Yahweh, You brought me up from Sheol; You spared me from among those going down to the Pit."},{"num":4,"text":"Sing to Yahweh, you His faithful ones, and praise His holy name."},{"num":5,"text":"For His anger lasts only a moment, but His favor, a lifetime. Weeping may spend the night, but there is joy in the morning."}]},{"header":"Psalm 30:6\u201312 (HCSB)","startVerse":6,"endVerse":12,"verses":[{"num":6,"text":"When I was secure, I said, \u201cI will never be shaken.\u201d"},{"num":7,"text":"Yahweh, when You showed Your favor, You made me stand like a strong mountain; when You hid Your face, I was terrified."},{"num":8,"text":"Yahweh, I called to You; I sought favor from my Lord:"},{"num":9,"text":"\u201cWhat gain is there in my death, if I go down to the Pit? Will the dust praise You? Will it proclaim Your truth?"},{"num":10,"text":"Yahweh, listen and be gracious to me; Yahweh, be my helper.\u201d"},{"num":11,"text":"You turned my lament into dancing; You removed my sackcloth and clothed me with gladness,"},{"num":12,"text":"so that I can sing to You and not be silent. Yahweh my God, I will praise You forever."}]}]},"31":{"blocks":[{"header":"Psalm 31:1-8 (HCSB)","startVerse":1,"endVerse":8,"verses":[{"num":1,"text":"For the choir director. A Davidic psalm Yahweh, I seek refuge in You; let me never be disgraced. Save me by Your righteousness."},{"num":2,"text":"Listen closely to me; rescue me quickly. Be a rock of refuge for me, a mountain fortress to save me."},{"num":3,"text":"For You are my rock and my fortress; You lead and guide me because of Your name."},{"num":4,"text":"You will free me from the net that is secretly set for me, for You are my refuge."},{"num":5,"text":"Into Your hand I entrust my spirit; You redeem me, Yahweh, God of truth."},{"num":6,"text":"I hate those who are devoted to worthless idols, but I trust in Yahweh."},{"num":7,"text":"I will rejoice and be glad in Your faithful love because You have seen my affliction. You have known the troubles of my life"},{"num":8,"text":"and have not handed me over to the enemy. You have set my feet in a spacious place."}]},{"header":"Psalm 31:9\u201313 (HCSB)","startVerse":9,"endVerse":13,"verses":[{"num":9,"text":"Be gracious to me, Yahweh, because I am in distress; my eyes are worn out from angry sorrow\u2014 my whole being as well."},{"num":10,"text":"Indeed, my life is consumed with grief and my years with groaning; my strength has failed because of my sinfulness, and my bones waste away."},{"num":11,"text":"I am ridiculed by all my adversaries and even by my neighbors. I am dreaded by my acquaintances; those who see me in the street run from me."},{"num":12,"text":"I am forgotten: gone from memory like a dead person\u2014like broken pottery."},{"num":13,"text":"I have heard the gossip of many; terror is on every side. When they conspired against me, they plotted to take my life."}]},{"header":"Psalm 31:14\u201318 (HCSB)","startVerse":14,"endVerse":18,"verses":[{"num":14,"text":"But I trust in You, Yahweh; I say, \u201cYou are my God.\u201d"},{"num":15,"text":"The course of my life is in Your power; deliver me from the power of my enemies and from my persecutors."},{"num":16,"text":"Show Your favor to Your servant; save me by Your faithful love."},{"num":17,"text":"Yahweh, do not let me be disgraced when I call on You. Let the wicked be disgraced; let them be silent in Sheol."},{"num":18,"text":"Let lying lips be quieted; they speak arrogantly against the righteous with pride and contempt."}]},{"header":"Psalm 31:19\u201324 (HCSB)","startVerse":19,"endVerse":24,"verses":[{"num":19,"text":"How great is Your goodness that You have stored up for those who fear You and accomplished in the sight of everyone for those who take refuge in You."},{"num":20,"text":"You hide them in the protection of Your presence; You conceal them in a shelter from the schemes of men, from quarrelsome tongues."},{"num":21,"text":"May Yahweh be praised, for He has wonderfully shown His faithful love to me in a city under siege."},{"num":22,"text":"In my alarm I had said, \u201cI am cut off from Your sight.\u201d But You heard the sound of my pleading when I cried to You for help."},{"num":23,"text":"Love Yahweh, all His faithful ones. Yahweh protects the loyal, but fully repays the arrogant."},{"num":24,"text":"Be strong and courageous, all you who put your hope in Yahweh."}]}]},"32":{"blocks":[{"header":"Psalm 32:1-5 (HCSB)","startVerse":1,"endVerse":5,"verses":[{"num":1,"text":"Davidic. A Maskil How joyful is the one whose transgression is forgiven, whose sin is covered!"},{"num":2,"text":"How joyful is the man Yahweh does not charge with sin and in whose spirit is no deceit!"},{"num":3,"text":"When I kept silent, my bones became brittle from my groaning all day long."},{"num":4,"text":"For day and night Your hand was heavy on me; my strength was drained as in the summer\u2019s heat.Selah"},{"num":5,"text":"Then I acknowledged my sin to You and did not conceal my iniquity. I said, \u201cI will confess my transgressions to Yahweh,\u201d and You took away the guilt of my sin. Selah"}]},{"header":"Psalm 32:6\u201311 (HCSB)","startVerse":6,"endVerse":11,"verses":[{"num":6,"text":"Therefore let everyone who is faithful pray to You at a time that You may be found. When great floodwaters come, they will not reach him."},{"num":7,"text":"You are my hiding place; You protect me from trouble. You surround me with joyful shouts of deliverance. Selah"},{"num":8,"text":"I will instruct you and show you the way to go; with My eye on you, I will give counsel."},{"num":9,"text":"Do not be like a horse or mule, without understanding, that must be controlled with bit and bridle or else it will not come near you."},{"num":10,"text":"Many pains come to the wicked, but the one who trusts in Yahweh will have faithful love surrounding him."},{"num":11,"text":"Be glad in Yahweh and rejoice, you righteous ones; shout for joy, all you upright in heart."}]}]},"34":{"blocks":[{"header":"Psalm 34:1-7 (HCSB)","startVerse":1,"endVerse":7,"verses":[{"num":1,"text":"Concerning David, when he pretended to be insane in the presence of Abimelech, who drove him out, and he departed I will praise Yahweh at all times; His praise will always be on my lips."},{"num":2,"text":"I will boast in Yahweh; the humble will hear and be glad."},{"num":3,"text":"Proclaim Yahweh\u2019s greatness with me; let us exalt His name together."},{"num":4,"text":"I sought Yahweh, and He answered me and delivered me from all my fears."},{"num":5,"text":"Those who look to Him are radiant with joy; their faces will never be ashamed."},{"num":6,"text":"This poor man cried, and Yahweh heard him and saved him from all his troubles."},{"num":7,"text":"The Angel of Yahweh encamps around those who fear Him, and rescues them."}]},{"header":"Psalm 34:8\u201314 (HCSB)","startVerse":8,"endVerse":14,"verses":[{"num":8,"text":"Taste and see that Yahweh is good. How happy is the man who takes refuge in Him!"},{"num":9,"text":"You who are His holy ones, fear Yahweh, for those who fear Him lack nothing."},{"num":10,"text":"Young lions lack food and go hungry, but those who seek Yahweh will not lack any good thing."},{"num":11,"text":"Come, children, listen to me; I will teach you the fear of Yahweh."},{"num":12,"text":"Who is the man who delights in life, loving a long life to enjoy what is good?"},{"num":13,"text":"Keep your tongue from evil and your lips from deceitful speech."},{"num":14,"text":"Turn away from evil and do what is good; seek peace and pursue it."}]},{"header":"Psalm 34:15\u201318 (HCSB)","startVerse":15,"endVerse":18,"verses":[{"num":15,"text":"The eyes of Yahweh are on the righteous, and His ears are open to their cry for help."},{"num":16,"text":"The face of Yahweh is set against those who do what is evil, to erase all memory of them from the earth."},{"num":17,"text":"The righteous cry out, and Yahweh hears, and delivers th
